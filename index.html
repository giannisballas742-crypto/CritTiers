<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CritTiers · Dynamic Mace Leaderboards</title>
  <!-- Google Fonts: clean MCTiers style -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0b0d12;
      color: #eef2ff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .app-wrapper {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px 48px 28px;
    }

    /* top bar */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 32px 0 20px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #11141c;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
    }

    .brand-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #b9c8ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .search-area {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      background: #12141c;
      border: 1px solid #2a2e3a;
      padding: 10px 16px;
      border-radius: 40px;
      width: 240px;
      font-family: 'Inter', monospace;
      font-size: 14px;
      color: #f0f3fa;
      outline: none;
      transition: 0.2s;
    }

    .search-input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 0 2px rgba(79, 172, 254, 0.2);
    }

    .refresh-btn {
      background: #1e212b;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      color: #cbd5ff;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }

    .refresh-btn:hover {
      background: #2d3243;
      color: white;
    }

    .server-card {
      background: #0f1118;
      border: 1px solid #262b36;
      border-radius: 48px;
      padding: 6px 12px 6px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(2px);
    }

    .server-label {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8f9bb5;
    }

    .ip-address {
      background: #1a1d26;
      padding: 6px 14px;
      border-radius: 32px;
      font-family: monospace;
      font-weight: 500;
      font-size: 15px;
      color: #b9e2ff;
    }

    .copy-ip-btn {
      background: #2b2f3e;
      border: none;
      color: white;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }

    .copy-ip-btn:hover {
      background: #3f4458;
    }

    .copy-feedback {
      font-size: 12px;
      color: #6cfe9e;
      margin-left: 6px;
    }

    /* dynamic tabs (MCTiers style) */
    .tabs-container {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0;
    }

    .mctier-tab {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 12px 18px;
      cursor: pointer;
      transition: all 0.2s;
      color: #a9b3cf;
      background: transparent;
      border: none;
      position: relative;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .mctier-tab:hover {
      color: #ffffff;
    }

    .mctier-tab.active {
      color: white;
    }

    .mctier-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 10%;
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, #4facfe, #9ad0ff, #00e0ff);
      border-radius: 4px;
      box-shadow: 0 0 8px #00c3ff;
    }

    .leaderboard-panels {
      margin-top: 36px;
    }

    .leader-panel {
      display: none;
      animation: fadeSlide 0.25s ease-out;
    }

    .leader-panel.active-panel {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rank-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(12, 14, 20, 0.75);
      backdrop-filter: blur(3px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rank-table thead tr {
      background: #0f121bb3;
    }

    .rank-table th {
      text-align: left;
      padding: 18px 20px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #b3c7ff;
      background: #0a0c14;
    }

    .rank-table td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #eef2ff;
      font-size: 15px;
    }

    .rank-table tbody tr:hover {
      background: rgba(79, 172, 254, 0.08);
    }

    .rank-number {
      font-weight: 700;
      color: #cbd5ff;
    }

    .player-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-avatar {
      width: 28px;
      height: 28px;
      border-radius: 30px;
      display: inline-block;
    }

    .kdr-high {
      color: #6cf9b0;
      font-weight: 700;
    }

    .tier-badge {
      background: #232837;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
      text-align: center;
      min-width: 48px;
      letter-spacing: 0.5px;
    }

    .tier-S { background: #d4af37; color: #1e1a0c; box-shadow: 0 0 4px gold; }
    .tier-A { background: #4c9aff; color: white; }
    .tier-B { background: #2e7d64; color: white; }
    .tier-C { background: #7b5a3c; color: white; }
    .tier-D { background: #5a4a4a; color: #ddd; }

    .loading-message, .error-message {
      background: #11131c;
      border-radius: 28px;
      padding: 48px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .footer-note {
      margin-top: 48px;
      text-align: center;
      font-size: 13px;
      color: #6c6f85;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 28px;
    }

    @media (max-width: 750px) {
      .app-wrapper { padding: 0 20px 32px 20px; }
      .top-bar { flex-direction: column; align-items: flex-start; }
      .right-panel { align-items: stretch; width: 100%; }
      .search-input { width: 100%; }
      .server-card { justify-content: space-between; }
      .mctier-tab { padding: 8px 12px; font-size: 13px; }
      .rank-table th, .rank-table td { padding: 12px 12px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="app-wrapper">
  <div class="top-bar">
    <div class="brand">
      <img class="brand-logo" src="https://i.ibb.co/3bHWyM6/image.png" alt="CritTiers" onerror="this.src='https://via.placeholder.com/54?text=CT'">
      <span class="brand-name">CritTiers</span>
    </div>
    <div class="right-panel">
      <div class="search-area">
        <input type="text" id="globalSearch" class="search-input" placeholder="Search players...">
        <button id="manualRefreshBtn" class="refresh-btn">⟳ SYNC</button>
      </div>
      <div class="server-card">
        <span class="server-label">✦ SERVER IP</span>
        <div class="ip-address" id="serverIpText">CritTiers.xyz</div>
        <button id="copyIpButton" class="copy-ip-btn">📋 COPY</button>
        <span id="copyToast" style="display:none;" class="copy-feedback">✓ Copied!</span>
      </div>
    </div>
  </div>

  <!-- dynamic tabs container -->
  <div class="tabs-container" id="tabContainer"></div>

  <!-- leaderboard panels container -->
  <div class="leaderboard-panels" id="leaderboardRoot"></div>
  <div class="footer-note">
    ⚡ Auto-sync every 60s from Google Sheets CSV | Tiers based on region / performance
  </div>
</div>

<script>
  // ======================= CONFIGURATION =======================
  // 🔁 REPLACE THIS URL WITH YOUR GOOGLE SHEETS CSV EXPORT LINK
  // Example format (File → Publish to web → CSV):
  // "https://docs.google.com/spreadsheets/d/e/2PACX-1vXXXXXX/pub?output=csv"
  const CSV_SOURCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAMPLE_PUBLISH_CSV/pub?output=csv";
  // If no URL is provided, a demo placeholder will be shown.
  // ==============================================================

  // Auto-refresh interval (milliseconds) = 60 seconds
  const AUTO_REFRESH_MS = 60000;

  // Global state
  let currentActiveTabKey = null;
  let tabsData = new Map();     // key -> { displayName, rows: [] }
  let panelElements = new Map(); // key -> panel DOM
  let tabButtons = [];           // store button refs

  // DOM elements
  const tabContainer = document.getElementById('tabContainer');
  const leaderboardRoot = document.getElementById('leaderboardRoot');
  const searchInput = document.getElementById('globalSearch');
  const refreshBtn = document.getElementById('manualRefreshBtn');

  // Helper: escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // generate avatar color based on player name
  function getAvatarColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
    const hue = Math.abs(hash % 360);
    return `hsl(${hue}, 65%, 48%)`;
  }

  // determine tier class from CSV column 'tier' or fallback to KDR-based
  function getTierClass(tierValue, kdr) {
    if (tierValue && typeof tierValue === 'string') {
      const upper = tierValue.trim().toUpperCase();
      if (['S','A','B','C','D'].includes(upper)) return `tier-${upper}`;
      return 'tier-B';
    }
    // fallback: auto tier based on KDR
    if (kdr >= 2.8) return 'tier-S';
    if (kdr >= 2.2) return 'tier-A';
    if (kdr >= 1.6) return 'tier-B';
    if (kdr >= 1.0) return 'tier-C';
    return 'tier-D';
  }

  function getTierLabel(tierValue, kdr) {
    if (tierValue && tierValue.trim()) return tierValue.trim().toUpperCase();
    if (kdr >= 2.8) return 'S';
    if (kdr >= 2.2) return 'A';
    if (kdr >= 1.6) return 'B';
    if (kdr >= 1.0) return 'C';
    return 'D';
  }

  // Build HTML table for given rows array
  function buildTableHTML(rows) {
    if (!rows || rows.length === 0) {
      return `<div class="loading-message" style="background:#0f1118;">✨ No players found for this category. Sync data via CSV.</div>`;
    }
    let html = `<div class="table-responsive"><table class="rank-table"><thead><tr>
      <th># RANK</th><th>PLAYER</th><th>KILLS</th><th>DEATHS</th><th>KDR</th><th>TIER</th>
    </tr></thead><tbody>`;
    for (const row of rows) {
      const kdrClass = row.kdr >= 2.4 ? 'kdr-high' : '';
      const tierClass = getTierClass(row.tier, row.kdr);
      const tierLabel = getTierLabel(row.tier, row.kdr);
      html += `<tr>
        <td class="rank-number">#${row.rank}</td>
        <td class="player-name"><span class="player-avatar" style="background:${getAvatarColor(row.player)};"></span> ${escapeHtml(row.player)}</td>
        <td>${Number(row.kills).toLocaleString()}</td>
        <td>${Number(row.deaths).toLocaleString()}</td>
        <td class="${kdrClass}">${row.kdr.toFixed(2)}</td>
        <td><span class="tier-badge ${tierClass}">${escapeHtml(tierLabel)}</span></td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
    return html;
  }

  // filter active panel by search term
  function filterCurrentTable(searchTerm) {
    if (!currentActiveTabKey) return;
    const tabInfo = tabsData.get(currentActiveTabKey);
    if (!tabInfo) return;
    const term = searchTerm.trim().toLowerCase();
    let filteredRows = [];
    if (term === "") {
      filteredRows = tabInfo.rows;
    } else {
      filteredRows = tabInfo.rows.filter(r => r.player.toLowerCase().includes(term));
    }
    const panel = panelElements.get(currentActiveTabKey);
    if (panel) {
      if (filteredRows.length === 0 && term !== "") {
        panel.innerHTML = `<div class="loading-message" style="background:#0f1118;">❌ No players match "${escapeHtml(term)}"</div>`;
      } else {
        panel.innerHTML = buildTableHTML(filteredRows);
      }
    }
  }

  // reset filter (clear search input)
  function resetFilter() {
    if (searchInput) searchInput.value = '';
    if (currentActiveTabKey) {
      const tabInfo = tabsData.get(currentActiveTabKey);
      const panel = panelElements.get(currentActiveTabKey);
      if (panel && tabInfo) panel.innerHTML = buildTableHTML(tabInfo.rows);
    }
  }

  // render tabs dynamically based on parsed data (preserve emoji only for "overall" case-insensitive)
  function renderTabs() {
    tabContainer.innerHTML = '';
    const sortedKeys = Array.from(tabsData.keys()).sort();
    if (sortedKeys.length === 0) {
      tabContainer.innerHTML = `<div style="color:#8f9bb5; padding:12px;">No categories loaded — check CSV link</div>`;
      return;
    }
    const buttons = [];
    for (const key of sortedKeys) {
      const displayBase = tabsData.get(key).displayName || key;
      let displayText = displayBase.toUpperCase();
      // 🏆 emoji only for tab that represents "overall" (case-insensitive)
      if (key.toLowerCase() === 'overall' || displayBase.toLowerCase() === 'overall') {
        displayText = `🏆 ${displayText}`;
      }
      const btn = document.createElement('button');
      btn.className = 'mctier-tab';
      btn.textContent = displayText;
      btn.setAttribute('data-tabkey', key);
      btn.addEventListener('click', () => {
        setActiveTab(key);
        resetFilter();
      });
      tabContainer.appendChild(btn);
      buttons.push(btn);
    }
    tabButtons = buttons;
    // activate first tab by default
    if (sortedKeys.length > 0 && !currentActiveTabKey) {
      setActiveTab(sortedKeys[0]);
    } else if (currentActiveTabKey && tabsData.has(currentActiveTabKey)) {
      setActiveTab(currentActiveTabKey);
    } else if (sortedKeys.length > 0) {
      setActiveTab(sortedKeys[0]);
    }
  }

  function setActiveTab(key) {
    // update button active style
    if (tabButtons) {
      tabButtons.forEach(btn => {
        const btnKey = btn.getAttribute('data-tabkey');
        if (btnKey === key) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }
    // hide all panels, show selected
    for (let [k, panel] of panelElements.entries()) {
      if (k === key) panel.classList.add('active-panel');
      else panel.classList.remove('active-panel');
    }
    currentActiveTabKey = key;
    // refresh content in case of filter reset
    const tabInfo = tabsData.get(key);
    const panel = panelElements.get(key);
    if (panel && tabInfo) {
      panel.innerHTML = buildTableHTML(tabInfo.rows);
    }
    if (searchInput) searchInput.value = '';
  }

  // create empty panels for each tab key
  function initPanelsStructure(keys) {
    leaderboardRoot.innerHTML = '';
    panelElements.clear();
    for (const key of keys) {
      const panelDiv = document.createElement('div');
      panelDiv.className = 'leader-panel';
      panelDiv.setAttribute('data-panel', key);
      panelDiv.innerHTML = `<div class="loading-message">Loading leaderboard data...</div>`;
      leaderboardRoot.appendChild(panelDiv);
      panelElements.set(key, panelDiv);
    }
  }

  // robust CSV parser (supports quotes, commas inside fields)
  function parseCSV(csvText) {
    const rows = [];
    const regex = /(?:,|^)(?:"([^"]*(?:""[^"]*)*)"|([^",]*))/g;
    let currentRow = [];
    let match = null;
    let lastIndex = 0;
    const lines = csvText.split(/\r?\n/);
    for (let line of lines) {
      if (line.trim() === "") continue;
      const row = [];
      let insideQuotes = false;
      let field = "";
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (insideQuotes && line[i+1] === '"') {
            field += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (ch === ',' && !insideQuotes) {
          row.push(field.trim());
          field = "";
        } else {
          field += ch;
        }
      }
      row.push(field.trim());
      if (row.length > 1 || (row.length === 1 && row[0] !== "")) rows.push(row);
    }
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.toLowerCase().replace(/^\uFEFF/, ''));
    const dataRows = rows.slice(1);
    const result = [];
    for (const row of dataRows) {
      if (row.length < headers.length) continue;
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = row[idx] || ""; });
      result.push(obj);
    }
    return result;
  }

  // fetch and update from CSV
  async function fetchAndUpdateLeaderboard() {
    if (!CSV_SOURCE_URL || CSV_SOURCE_URL === "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAMPLE_PUBLISH_CSV/pub?output=csv") {
      // Show demo / placeholder message with instructions
      leaderboardRoot.innerHTML = `<div class="error-message">
        <strong>⚠️ CSV source not configured</strong><br><br>
        Please set your Google Sheets CSV export link in the script:<br>
        <code style="background:#1e1f2a; padding:6px 12px; border-radius:12px; display:inline-block; margin-top:8px;">const CSV_SOURCE_URL = "YOUR_PUBLISHED_CSV_LINK";</code>
        <br><br>📌 Expected CSV columns: <strong>tab, rank, player, kills, deaths, tier</strong> (tier optional).<br>
        Auto-sync will start after providing a valid URL.
      </div>`;
      tabContainer.innerHTML = `<div style="color:#8f9bb5;">Awaiting CSV configuration</div>`;
      return;
    }
    try {
      // show loading indicator on current panel if exists
      if (currentActiveTabKey && panelElements.has(currentActiveTabKey)) {
        const panel = panelElements.get(currentActiveTabKey);
        if (panel) panel.innerHTML = `<div class="loading-message">⟳ Syncing with Google Sheets...</div>`;
      } else {
        leaderboardRoot.innerHTML = `<div class="loading-message">⟳ Fetching live leaderboard data...</div>`;
      }
      const response = await fetch(CSV_SOURCE_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const csvText = await response.text();
      const parsed = parseCSV(csvText);
      if (!parsed.length) throw new Error("CSV is empty or invalid format");

      // group by 'tab' column (required)
      const groups = new Map();
      for (const row of parsed) {
        let tabKey = (row.tab || row.category || "").trim().toLowerCase();
        if (!tabKey) continue;
        const rankRaw = parseInt(row.rank, 10);
        const killsRaw = parseInt(row.kills, 10) || 0;
        const deathsRaw = parseInt(row.deaths, 10) || 1;
        const kdr = killsRaw / Math.max(1, deathsRaw);
        const playerName = row.player || row.name || "Unknown";
        const tierValue = row.tier || "";
        if (!groups.has(tabKey)) {
          groups.set(tabKey, []);
        }
        groups.get(tabKey).push({
          rank: rankRaw,
          player: String(playerName).trim(),
          kills: killsRaw,
          deaths: deathsRaw,
          kdr: kdr,
          tier: String(tierValue).trim()
        });
      }
      if (groups.size === 0) throw new Error("No valid 'tab' column found. Ensure CSV has column named 'tab'");
      // sort each group by rank ascending
      for (let [key, rows] of groups.entries()) {
        rows.sort((a,b) => a.rank - b.rank);
        groups.set(key, rows);
      }
      // store into tabsData
      tabsData.clear();
      for (let [key, rows] of groups.entries()) {
        let displayName = key.charAt(0).toUpperCase() + key.slice(1);
        tabsData.set(key, { displayName, rows });
      }
      // rebuild panels and tabs
      const tabKeys = Array.from(tabsData.keys());
      initPanelsStructure(tabKeys);
      renderTabs();
      // after rendering, ensure active panel is set and data displayed
      if (tabKeys.length > 0) {
        const firstKey = tabKeys[0];
        setActiveTab(firstKey);
        resetFilter();
      }
    } catch (err) {
      console.error("CSV Sync Error:", err);
      leaderboardRoot.innerHTML = `<div class="error-message">
        ❌ Failed to load/parse CSV.<br>
        URL: ${escapeHtml(CSV_SOURCE_URL)}<br>
        Error: ${escapeHtml(err.message)}<br><br>
        Ensure the CSV is published and contains columns: <strong>tab, rank, player, kills, deaths</strong> (tier optional).
      </div>`;
      tabContainer.innerHTML = `<div style="color:#b77c7c;">⚠️ Data error — check console</div>`;
    }
  }

  // Auto refresh interval
  let refreshInterval = null;
  function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => {
      fetchAndUpdateLeaderboard();
    }, AUTO_REFRESH_MS);
  }

  // Manual refresh handler
  function handleManualRefresh() {
    fetchAndUpdateLeaderboard();
  }

  // Search event
  function bindSearch() {
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        if (currentActiveTabKey) filterCurrentTable(e.target.value);
      });
    }
  }

  // Copy IP
  function bindCopyIP() {
    const copyBtn = document.getElementById('copyIpButton');
    const ipSpan = document.getElementById('serverIpText');
    const toastSpan = document.getElementById('copyToast');
    if (copyBtn && ipSpan) {
      copyBtn.addEventListener('click', async () => {
        const ip = ipSpan.innerText;
        try {
          await navigator.clipboard.writeText(ip);
          if (toastSpan) {
            toastSpan.style.display = 'inline-block';
            setTimeout(() => { toastSpan.style.display = 'none'; }, 1800);
          }
        } catch (e) {
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          if (toastSpan) {
            toastSpan.style.display = 'inline-block';
            setTimeout(() => toastSpan.style.display = 'none', 1500);
          }
        }
      });
    }
  }

  // ========== STAR PARTICLES (original bigger stars) ==========
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let starsArray = [];
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function initStars() {
    starsArray = [];
    const starCount = 140;
    for (let i = 0; i < starCount; i++) {
      starsArray.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.5 + 0.7,
        alpha: Math.random() * 0.7 + 0.2,
        delta: Math.random() * 0.01 + 0.002,
        direction: Math.random() > 0.5 ? 1 : -1
      });
    }
  }
  function drawStars() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of starsArray) {
      ctx.fillStyle = `rgba(255, 245, 210, ${s.alpha})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
      s.alpha += s.delta * s.direction;
      if (s.alpha <= 0.1) { s.alpha = 0.1; s.direction = 1; }
      else if (s.alpha >= 0.95) { s.alpha = 0.95; s.direction = -1; }
    }
    requestAnimationFrame(drawStars);
  }
  window.addEventListener('resize', () => {
    resizeCanvas();
    initStars();
  });
  resizeCanvas();
  initStars();
  drawStars();

  // ========== INIT APP ==========
  async function init() {
    bindSearch();
    bindCopyIP();
    if (refreshBtn) refreshBtn.addEventListener('click', handleManualRefresh);
    // initial load
    await fetchAndUpdateLeaderboard();
    startAutoRefresh();
  }
  init();
</script>
</body>
</html>
