<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CritTiers</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;

    /* ✅ SMOOTH DARK GRADIENT (NO LINES) */
    background: linear-gradient(to bottom, #4a4a4a, #2f2f2f);
}

/* PARTICLES */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 30px 40px 10px 40px;
}

/* LEFT */
.left {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
}

.left img {
    width: 55px;
    height: 55px;
    border-radius: 10px;
}

.title {
    font-size: 28px;
    font-weight: bold;
}

/* RIGHT */
.right {
    text-align: right;
}

.search {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    outline: none;
}

/* SERVER BOX */
.server-box {
    margin-top: 10px;
    background: #1a1a1a;
    padding: 8px 12px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.08);
}

.server-ip {
    background: #0f0f0f;
    padding: 5px 10px;
    border-radius: 6px;
}

/* TABS */
.tabs {
    display: flex;
    gap: 25px;
    padding: 10px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.tab {
    padding: 10px 5px;
    cursor: pointer;
    position: relative;
    color: #ccc;
    font-weight: 500;
    transition: 0.2s;
}

.tab:hover {
    color: white;
}

.tab.active {
    color: white;
}

.tab.active::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -10px;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    box-shadow: 0 0 8px #00f2fe;
    border-radius: 2px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- TOP -->
<div class="topbar">
    <div class="left">
        <img src="https://i.ibb.co/3bHWyM6/image.png">
        <div class="title">CritTiers</div>
    </div>

    <div class="right">
        <input type="text" class="search" placeholder="Search players...">
        <div class="server-box">
            <span>SERVER IP</span>
            <div class="server-ip">CritTiers.xyz</div>
        </div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active">Overall</div>
    <div class="tab">Spearmace</div>
    <div class="tab">MaceCart</div>
    <div class="tab">Modern</div>
    <div class="tab">DSMP Mace</div>
    <div class="tab">NethSMP</div>
</div>

<script>
/* TAB SWITCH */
const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => {
    tab.onclick = () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
    };
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
}

animate();

window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
};
</script>

</body>
</html>
