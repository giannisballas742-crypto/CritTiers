<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CritTiers · Mace PvP Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1c23 0%, #0a0c10 100%);
    color: #eef2ff;
    overflow-x: hidden;
    min-height: 100vh;
  }
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.5;
    animation: floatParticle linear infinite;
    box-shadow: 0 0 4px rgba(255,255,255,0.8);
  }
  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0.2); opacity: 0; }
    15% { opacity: 0.6; }
    85% { opacity: 0.6; }
    100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
  }

  .top-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 12px 0 16px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 20px;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-left: -8px; }
  .brand-logo {
    width: 48px; height: 48px; border-radius: 12px;
    background: #11141c; object-fit: cover;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
  .brand-name {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, #7cb8ff);
    background-clip: text; -webkit-background-clip: text; color: transparent;
  }
  .right-panel { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-top: -4px; }
  .search-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .search-input {
    background: #12141c; border: 1px solid #2a2e3a; padding: 8px 14px;
    border-radius: 40px; width: 220px; font-family: 'Inter', monospace;
    font-size: 13px; color: #f0f3fa; outline: none;
  }
  .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  .discord-btn {
    background: #5865F2; padding: 7px 16px; border-radius: 40px;
    font-weight: 600; font-size: 13px; color: white;
    display: inline-flex; align-items: center; gap: 6px;
    transition: 0.2s; text-decoration: none;
  }
  .discord-btn:hover { background: #4752c4; transform: scale(1.02); }
  .server-card {
    background: #0f1118; border: 1px solid #262b36; border-radius: 48px;
    padding: 4px 10px 4px 16px; display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(2px);
  }
  .server-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: #8f9bb5; }
  .ip-address { background: #1a1d26; padding: 4px 10px; border-radius: 32px; font-family: monospace; font-weight: 500; font-size: 13px; color: #a3c6ff; }
  .copy-ip-btn { background: #2b2f3e; border: none; color: white; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
  .copy-ip-btn:hover { background: #3f4458; }
  .copy-feedback { font-size: 11px; color: #6cfe9e; margin-left: 4px; }

  .tabs-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 0;
    margin-top: 12px;
  }
  .mctier-tab {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    color: #a9b3cf;
    background: transparent;
    border: none;
    position: relative;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .mctier-tab:hover { color: #ffffff; }
  .mctier-tab.active { color: white; }
  .mctier-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 10%;
    width: 80%;
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #7cb8ff, #60a5fa);
    border-radius: 4px;
    box-shadow: 0 0 8px #3b82f6;
  }

  .player-card {
    background: #1f2937;
    padding: 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    transition: 0.2s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  /* Fancy banners for top 3 */
  .player-card.gold-banner {
    background: linear-gradient(135deg, #1f2937 0%, #1a1f2c 100%);
    border-left: 4px solid #ffd700;
    box-shadow: 0 0 12px rgba(255,215,0,0.3), inset 0 1px 0 rgba(255,215,0,0.2);
  }
  .player-card.gold-banner::before {
    content: "👑";
    position: absolute;
    top: -8px;
    right: 12px;
    font-size: 28px;
    opacity: 0.2;
    transform: rotate(15deg);
    pointer-events: none;
  }
  .player-card.gold-banner::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    background: radial-gradient(ellipse at 30% 50%, rgba(255,215,0,0.08), transparent 70%);
    pointer-events: none;
  }
  .player-card.silver-banner {
    background: linear-gradient(135deg, #1f2937 0%, #1a1f2c 100%);
    border-left: 4px solid #c0c0c0;
    box-shadow: 0 0 10px rgba(192,192,192,0.25), inset 0 1px 0 rgba(192,192,192,0.15);
  }
  .player-card.silver-banner::before {
    content: "🏅";
    position: absolute;
    top: -8px;
    right: 12px;
    font-size: 28px;
    opacity: 0.2;
    transform: rotate(10deg);
    pointer-events: none;
  }
  .player-card.bronze-banner {
    background: linear-gradient(135deg, #1f2937 0%, #1a1f2c 100%);
    border-left: 4px solid #cd7f32;
    box-shadow: 0 0 10px rgba(205,127,50,0.25), inset 0 1px 0 rgba(205,127,50,0.1);
  }
  .player-card.bronze-banner::before {
    content: "🏅";
    position: absolute;
    top: -8px;
    right: 12px;
    font-size: 28px;
    opacity: 0.2;
    transform: rotate(5deg);
    pointer-events: none;
  }
  .player-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 20px rgba(59,130,246,0.3);
    border-color: rgba(59,130,246,0.5);
  }
  .player-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #2d3748;
    border: 2px solid #3b82f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    color: #a0aec0;
    flex-shrink: 0;
  }
  .tier-header {
    font-weight: 800;
    padding: 6px 20px;
    border-radius: 40px;
    margin-bottom: 12px;
    display: inline-block;
    cursor: help;
    font-size: 1.2rem;
  }
  [data-tooltip] { position: relative; cursor: help; }
  [data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: #0b0f1c;
    color: #ffecb3;
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    border: 1px solid #3b82f6;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    backdrop-filter: blur(2px);
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
  }
  [data-tooltip]:hover::after { opacity: 1; }

  .mode-icons {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .mode-icon-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 52px;
    cursor: help;
  }
  .mode-icon-placeholder {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #2d3748;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    border: 2px solid #555;
  }
  .mode-icon-container:hover .mode-icon-placeholder { transform: scale(1.05); border-color: #3b82f6; }
  .mode-tier {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 9999px;
    text-align: center;
    min-width: 38px;
  }

  .rank {
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 0.75rem;
  }
  .rank.master { background: linear-gradient(135deg, #ffd966, #ffaa33); color: #2c1a00; }
  .rank.ace { background: linear-gradient(135deg, #a0a0ff, #6c6cff); color: white; }
  .rank.specialist { background: linear-gradient(135deg, #6ab04c, #2ecc71); color: #1a3a1a; }
  .rank.cadet { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
  .rank.novice { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
  .rank.rookie { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; }
  .rank-large { font-size: 1rem !important; padding: 6px 18px !important; }

  .region-badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; margin-left: 6px; }
  .region-badge.EU { background:#22c55e; color:#000; }
  .region-badge.AS { background:#3b82f6; color:#fff; }
  .region-badge.NA { background:#ef4444; color:#fff; }
  .region-badge.SA { background:#db2777; color:#fff; }
  .region-badge.AU { background:#fbbf24; color:#000; }

  .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); position:fixed; inset:0; display:flex; justify-content:center; align-items:center; z-index:1000; }
  .modal { background:#1f2937; padding:24px; border-radius:28px; max-width:500px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid #3b82f6; box-shadow:0 20px 35px rgba(0,0,0,0.6); }
  .modal-close { cursor:pointer; float:right; font-size:1.8rem; line-height:1; color:#aaa; }
  .modal-close:hover { color:#3b82f6; }

  .main-container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
  @media (max-width: 700px) {
    .top-bar { flex-direction: column; align-items: flex-start; }
    .right-panel { align-items: stretch; width: 100%; }
    .search-input { width: 100%; }
    .player-card { flex-wrap: wrap; }
    .main-container { padding: 0 16px; }
  }
</style>
</head>
<body>
<div id="particles"></div>
<div class="main-container">
  <div class="top-bar">
    <div class="brand">
      <img class="brand-logo" src="https://i.ibb.co/3bHWyM6/image.png" alt="CritTiers" onerror="this.src='https://via.placeholder.com/48?text=CT'">
      <span class="brand-name">CritTiers</span>
    </div>
    <div class="right-panel">
      <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="Search players...">
        <a href="https://discord.gg/2P7QJDgDh" target="_blank" class="discord-btn"><i class="fab fa-discord"></i> Join Discord</a>
      </div>
      <div class="server-card">
        <span class="server-label">✦ SERVER IP</span>
        <div class="ip-address" id="serverIpText">CritTiers.xyz</div>
        <button id="copyIpButton" class="copy-ip-btn">📋 COPY</button>
        <span id="copyToast" style="display:none;" class="copy-feedback">✓ Copied!</span>
      </div>
    </div>
  </div>

  <div id="tabs" class="tabs-container"></div>
  <div id="mode-title-container" class="mt-4 mb-2"></div>
  <div id="rankings"></div>

  <div id="player-modal" class="hidden modal-bg">
    <div class="modal">
      <span class="modal-close" id="modal-close">&times;</span>
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQm8-1rFiM_NhzXsNqWuirSOx8OlbfERAHXOURGsw3Q-S2WONa7ox73AnGTWqPxLMJSdeKFrieBe4Ph/pub?output=csv";
  const REGION_COLUMN_INDEX = 2;
  let allRows = [], nameCol = "", pointsCol = "", regionCol = "__region";

  const tierPointsMap = { "HT1":60,"LT1":45,"HT2":30,"LT2":20,"HT3":10,"LT3":6,"HT4":4,"LT4":3,"HT5":2,"LT5":1 };
  const tierOrder = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
  const tierColors = { HT1:"#f1c40f", LT1:"#ffa600", HT2:"#bdc3c7", LT2:"#95a5a6", HT3:"#ff8531", LT3:"#f37324", HT4:"#55ffff", LT4:"#aaffff", HT5:"#5555ff", LT5:"#AAAAFF" };

  const MODE_NAMES = ["Spearmace", "MaceCart", "Modern", "DSMP Mace", "NethSMP"];
  // Case‑insensitive column matching
  function findModeColumn(player, modeName) {
    const lowerMode = modeName.toLowerCase();
    for (let key in player) {
      if (key.toLowerCase() === lowerMode) return key;
    }
    // also try without spaces (e.g., "DSMPMace")
    const noSpace = modeName.replace(/\s/g, '');
    for (let key in player) {
      if (key.toLowerCase() === noSpace.toLowerCase()) return key;
    }
    return null;
  }

  function getPlayerModes(player) {
    const result = [];
    for (let mode of MODE_NAMES) {
      const col = findModeColumn(player, mode);
      if (col && player[col] && player[col].trim() !== "") {
        result.push({ modeName: mode, rawTier: player[col] });
      }
    }
    return result;
  }

  function extractBaseTierFromCode(tierCode) {
    const match = tierCode.match(/(HT[1-5]|LT[1-5])/i);
    return match ? match[1].toUpperCase() : null;
  }
  function parseTierString(tierStr) {
    if (!tierStr) return null;
    const upper = tierStr.toUpperCase().trim();
    const peakMatch = upper.match(/^(.*?)\s*\(\s*PEAK\s+(HT[1-5]|LT[1-5])\s*\)$/i);
    if (peakMatch) {
      const rawDisplay = peakMatch[1].trim();
      const peakTier = peakMatch[2].toUpperCase();
      const baseTier = extractBaseTierFromCode(rawDisplay);
      if (!baseTier) return null;
      return { display: rawDisplay, baseTier: baseTier, peakTier: peakTier };
    }
    const baseTier = extractBaseTierFromCode(upper);
    if (!baseTier) return null;
    return { display: upper, baseTier: baseTier, peakTier: null };
  }

  function getRoleByRank(rank) {
    if (rank <= 3) return { name: "CritTiers Master", icon: "<i class='fas fa-crown'></i>", className: "master", symbol: "🏆" };
    if (rank <= 28) return { name: "CritTiers Ace", icon: "<i class='fas fa-shield-alt'></i>", className: "ace", symbol: "⚡" };
    if (rank <= 63) return { name: "CritTiers Specialist", icon: "<i class='fas fa-star'></i>", className: "specialist", symbol: "✨" };
    if (rank <= 163) return { name: "CritTiers Cadet", icon: "<i class='fas fa-user-graduate'></i>", className: "cadet", symbol: "🎓" };
    if (rank <= 463) return { name: "CritTiers Novice", icon: "<i class='fas fa-feather-alt'></i>", className: "novice", symbol: "🌱" };
    return { name: "CritTiers Rookie", icon: "<i class='fas fa-baby-carriage'></i>", className: "rookie", symbol: "🍼" };
  }
  function getRankBadge(rank, large = false) {
    const r = getRoleByRank(rank);
    const cls = large ? `rank ${r.className} rank-large` : `rank ${r.className}`;
    return `<span class="${cls}"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`;
  }

  function getInitial(name) { return name ? name.charAt(0).toUpperCase() : "?"; }

  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
    const data = lines.slice(1).map(l=>{
      const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
      const obj = {};
      headers.forEach((h,i)=>obj[h]=cells[i]||"");
      obj["__region"] = cells[REGION_COLUMN_INDEX] || "";
      return obj;
    });
    return { headers, data };
  }

  function getModeIconsHTML(player) {
    const modes = getPlayerModes(player);
    if (modes.length === 0) return '<div class="mode-icons" style="opacity:0.5;"><span class="text-xs text-gray-400">no tiers</span></div>';
    let html = '<div class="mode-icons">';
    for (let { modeName, rawTier } of modes) {
      const parsed = parseTierString(rawTier);
      if (!parsed) continue;
      const displayTier = parsed.display;
      const baseTier = parsed.baseTier;
      const peakTier = parsed.peakTier;
      const color = tierColors[baseTier] || "#666";
      let tooltipText = peakTier ? `⚡ Peak: ${peakTier} → ${tierPointsMap[peakTier]} pts` : `${displayTier} → ${tierPointsMap[baseTier]} pts`;
      let shortMode = modeName.replace("Mace", "").replace("DSMP", "").substring(0, 3);
      if (modeName === "DSMP Mace") shortMode = "DSM";
      html += `<div class="mode-icon-container" data-tooltip="${tooltipText}">
                  <div class="mode-icon-placeholder" style="background:${color}20; border-color:${color};">
                    <span style="font-size:10px; font-weight:bold; color:${color};">${shortMode}</span>
                  </div>
                  <div class="mode-tier" style="background:${color}; color:#000;">${displayTier}</div>
                </div>`;
    }
    html += '</div>';
    return html;
  }

  async function loadCSV() {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const { headers, data } = parseCSV(text);
    allRows = data;
    nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
    pointsCol = headers.find(h=>/points/i.test(h)) || headers[1];
    
    const sortedByPoints = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sortedByPoints.forEach((player, idx) => { player.overallRank = idx + 1; });
    
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";
    const allModes = ["Overall", ...MODE_NAMES];
    allModes.forEach((mode, idx) => {
      const btn = document.createElement("button");
      btn.textContent = mode === "Overall" ? "🏆 OVERALL" : mode.toUpperCase();
      btn.className = "mctier-tab";
      if(idx === 0) btn.classList.add("active");
      btn.onclick = () => {
        document.querySelectorAll(".mctier-tab").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        loadMode(mode);
      };
      tabsDiv.appendChild(btn);
    });
    loadMode("Overall");
  }

  function updateModeTitle(mode) {
    const container = document.getElementById("mode-title-container");
    if (!container) return;
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl font-bold border-l-4 border-blue-500 pl-3 mb-5";
    title.textContent = mode === "Overall" ? "🏆 OVERALL RANKINGS" : `${mode.toUpperCase()} RANKINGS`;
    container.innerHTML = "";
    container.appendChild(title);
  }

  function loadMode(mode) {
    updateModeTitle(mode);
    let htmlOut = "";
    if (mode === "Overall") {
      const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
      sorted.forEach((r, idx) => {
        const name = r[nameCol];
        if(!name) return;
        const rank = idx + 1;
        const pointsVal = parseFloat(r[pointsCol]||0);
        const region = r[regionCol];
        const initial = getInitial(name);
        let bannerClass = "";
        let medalHtml = "";
        if(rank === 1) { bannerClass = "gold-banner"; medalHtml = `<i class="fas fa-crown text-yellow-400 mr-1"></i>`; }
        else if(rank === 2) { bannerClass = "silver-banner"; medalHtml = `<i class="fas fa-medal text-gray-300 mr-1"></i>`; }
        else if(rank === 3) { bannerClass = "bronze-banner"; medalHtml = `<i class="fas fa-medal text-amber-600 mr-1"></i>`; }
        let regionHTML = "";
        if(region) {
          let rc = ""; const reg = region.toUpperCase().trim();
          if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
          regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
        }
        htmlOut += `<div class="player-card ${bannerClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}" data-rank="${rank}">
          <div class="player-avatar">${initial}</div>
          <div class="flex-1">
            <div class="flex items-center flex-wrap gap-2"><span class="font-bold text-lg">${rank}.</span> ${medalHtml}<span class="font-semibold">${name}</span>${regionHTML}</div>
            ${getModeIconsHTML(r)}
          </div>
          <div class="text-right flex flex-col items-end gap-1">
            ${getRankBadge(rank, true)}
            <div class="font-mono text-xl font-bold text-blue-400">${r[pointsCol]} <span class="text-sm">pts</span></div>
          </div>
        </div>`;
      });
    } else {
      // For specific mode tab, group by tier using the exact column (case-insensitive)
      const groups = {};
      const modeCol = findModeColumn({}, mode) || mode; // fallback
      allRows.forEach(r => {
        const name = r[nameCol];
        if(!name) return;
        let raw = null;
        for (let key in r) {
          if (key.toLowerCase() === mode.toLowerCase()) { raw = r[key]; break; }
        }
        if (!raw) return;
        const baseTier = extractBaseTierFromCode(raw);
        if (!baseTier) return;
        if(!groups[baseTier]) groups[baseTier]=[];
        groups[baseTier].push(r);
      });
      tierOrder.forEach(tier => {
        if(!groups[tier]) return;
        const pointsValue = tierPointsMap[tier] || "?";
        htmlOut += `<div class="mb-6"><div class="tier-header" style="background:${tierColors[tier]}" data-tooltip="${tier} → ${pointsValue} points">${tier}</div>`;
        groups[tier].forEach(r => {
          const name = r[nameCol];
          const region = r[regionCol];
          const pointsVal = parseFloat(r[pointsCol]||0);
          const overallRank = r.overallRank || 999;
          const initial = getInitial(name);
          let regionHTML = "";
          if(region) {
            let rc = ""; const reg = region.toUpperCase().trim();
            if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
            regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
          }
          htmlOut += `<div class="player-card" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}" data-rank="${overallRank}">
            <div class="player-avatar">${initial}</div>
            <div class="flex items-center gap-2 flex-wrap flex-1"><span class="font-semibold">${name}</span>${regionHTML}${getRankBadge(overallRank, false)}</div>
            <div class="font-mono text-sm ml-auto text-blue-300">${r[pointsCol] || 0} pts</div>
          </div>`;
        });
        htmlOut += `</div>`;
      });
    }
    document.getElementById("rankings").innerHTML = htmlOut;

    document.querySelectorAll(".player-card").forEach(card => {
      card.onclick = () => {
        const p = JSON.parse(card.dataset.player.replace(/&apos;/g, "'"));
        const region = p[regionCol];
        const pointsVal = parseFloat(p[pointsCol]||0);
        const overallRank = p.overallRank || 999;
        const initial = getInitial(p[nameCol]);
        let regionInline = '';
        if(region) {
          let rc = ""; const reg = region.toUpperCase().trim();
          if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
          regionInline = `<span class="region-badge ${rc} ml-2 align-middle">${region}</span>`;
        }
        let modalHtml = `<div class="flex justify-center mb-4"><div class="player-avatar" style="width:100px;height:100px;font-size:42px;border-width:3px;">${initial}</div></div>
        <h2 class="text-2xl font-bold text-center">${p[nameCol]} ${regionInline}</h2>
        <div class="flex justify-center mt-3">${getRankBadge(overallRank, true)}</div>
        <div class="mt-6">${getModeIconsHTML(p)}</div>
        <div class="text-center mt-4"><span class="text-gray-400">Overall Rank:</span> <span class="text-xl font-bold text-yellow-400">#${overallRank}</span></div>
        <div class="text-center mt-2 border-t border-gray-600 pt-3"><span class="text-gray-400">Total Points:</span> <span class="text-2xl font-bold text-blue-400">${p[pointsCol]}</span></div>`;
        document.getElementById("modal-content").innerHTML = modalHtml;
        document.getElementById("player-modal").classList.remove("hidden");
      };
    });
  }

  document.getElementById("search-input").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll(".player-card").forEach(card => {
      card.style.display = card.textContent.toLowerCase().includes(term) ? "flex" : "none";
    });
  });

  const copyBtn = document.getElementById("copyIpButton");
  const ipSpan = document.getElementById("serverIpText");
  const toastSpan = document.getElementById("copyToast");
  copyBtn.addEventListener("click", async () => {
    await navigator.clipboard.writeText(ipSpan.innerText);
    toastSpan.style.display = "inline-block";
    setTimeout(() => toastSpan.style.display = "none", 1500);
  });

  document.getElementById("modal-close").onclick = () => document.getElementById("player-modal").classList.add("hidden");

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 180; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = Math.random() * 3 + 1.5;
      p.style.width = `${s}px`;
      p.style.height = `${s}px`;
      p.style.left = `${Math.random() * 100}vw`;
      p.style.animationDuration = `${Math.random() * 20 + 12}s`;
      p.style.animationDelay = `-${Math.random() * 30}s`;
      p.style.opacity = Math.random() * 0.6 + 0.2;
      container.appendChild(p);
    }
  }
  createParticles();
  loadCSV();
  setInterval(() => loadCSV().catch(console.warn), 60000);
</script>
</body>
</html>
