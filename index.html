<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CritTiers · Mace PvP Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1c23 0%, #0a0c10 100%);
    color: #eef2ff;
    overflow-x: hidden;
    min-height: 100vh;
  }
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.5;
    animation: floatParticle linear infinite;
    box-shadow: 0 0 4px rgba(255,255,255,0.8);
  }
  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0.2); opacity: 0; }
    15% { opacity: 0.6; }
    85% { opacity: 0.6; }
    100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
  }

  .top-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 12px 0 16px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 20px;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-left: -8px; }
  .brand-logo {
    width: 48px; height: 48px; border-radius: 12px;
    background: #11141c; object-fit: cover;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
  .brand-name {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, #7cb8ff);
    background-clip: text; -webkit-background-clip: text; color: transparent;
  }
  .right-panel { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-top: -4px; }
  .search-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .search-input {
    background: #12141c; border: 1px solid #2a2e3a; padding: 8px 14px;
    border-radius: 40px; width: 220px; font-family: 'Inter', monospace;
    font-size: 13px; color: #f0f3fa; outline: none;
  }
  .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  .discord-btn {
    background: #5865F2; padding: 7px 16px; border-radius: 40px;
    font-weight: 600; font-size: 13px; color: white;
    display: inline-flex; align-items: center; gap: 6px;
    transition: 0.2s; text-decoration: none;
  }
  .discord-btn:hover { background: #4752c4; transform: scale(1.02); }
  .server-card {
    background: #0f1118; border: 1px solid #262b36; border-radius: 48px;
    padding: 4px 10px 4px 16px; display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(2px);
  }
  .server-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: #8f9bb5; }
  .ip-address { background: #1a1d26; padding: 4px 10px; border-radius: 32px; font-family: monospace; font-weight: 500; font-size: 13px; color: #a3c6ff; }
  .copy-ip-btn { background: #2b2f3e; border: none; color: white; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
  .copy-ip-btn:hover { background: #3f4458; }
  .copy-feedback { font-size: 11px; color: #6cfe9e; margin-left: 4px; }

  .tabs-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 0;
    margin-top: 12px;
  }
  .mctier-tab {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    color: #a9b3cf;
    background: transparent;
    border: none;
    position: relative;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .mctier-tab:hover { color: #ffffff; }
  .mctier-tab.active { color: white; }
  .mctier-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 10%;
    width: 80%;
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #7cb8ff, #60a5fa);
    border-radius: 4px;
    box-shadow: 0 0 8px #3b82f6;
  }

  /* Tier columns grid */
  .tier-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 10px;
  }
  .tier-column {
    background: rgba(15, 17, 24, 0.6);
    border-radius: 20px;
    padding: 16px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .tier-header-col {
    font-size: 1.3rem;
    font-weight: 800;
    text-align: center;
    padding: 8px;
    border-radius: 40px;
    margin-bottom: 16px;
    background: #1a1d2a;
  }
  .player-card-tier {
    background: #1f2937;
    padding: 10px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    transition: 0.2s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .player-card-tier.ht-bright {
    background: linear-gradient(135deg, #2a3a4a, #1f2937);
    border-left: 3px solid #ffd966;
  }
  .player-card-tier.lt-dark {
    background: linear-gradient(135deg, #1a202c, #111827);
    border-left: 3px solid #6c757d;
    opacity: 0.9;
  }
  .player-card-tier:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(59,130,246,0.2);
  }
  .player-avatar-small {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #2d3748;
    border: 2px solid #3b82f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
    color: #a0aec0;
    flex-shrink: 0;
  }
  .player-info {
    flex: 1;
  }
  .player-name {
    font-weight: 600;
    font-size: 0.9rem;
  }
  .player-points {
    font-size: 0.75rem;
    color: #7cb8ff;
  }
  .tier-badge-col {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: #2d3748;
  }
  @media (max-width: 700px) {
    .tier-grid { grid-template-columns: 1fr; }
    .player-card-tier { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div id="particles"></div>
<div class="main-container" style="max-width: 1400px; margin: 0 auto; padding: 0 20px;">
  <div class="top-bar">
    <div class="brand">
      <img class="brand-logo" src="https://i.ibb.co/3bHWyM6/image.png" alt="CritTiers" onerror="this.src='https://via.placeholder.com/48?text=CT'">
      <span class="brand-name">CritTiers</span>
    </div>
    <div class="right-panel">
      <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="Search players...">
        <a href="https://discord.gg/2P7QJDgDh" target="_blank" class="discord-btn"><i class="fab fa-discord"></i> Join Discord</a>
      </div>
      <div class="server-card">
        <span class="server-label">✦ SERVER IP</span>
        <div class="ip-address" id="serverIpText">CritTiers.xyz</div>
        <button id="copyIpButton" class="copy-ip-btn">📋 COPY</button>
        <span id="copyToast" style="display:none;" class="copy-feedback">✓ Copied!</span>
      </div>
    </div>
  </div>

  <div id="tabs" class="tabs-container"></div>
  <div id="mode-title-container" class="mt-4 mb-2"></div>
  <div id="rankings"></div>

  <div id="player-modal" class="hidden modal-bg">
    <div class="modal" style="background:#1f2937; padding:24px; border-radius:28px; max-width:500px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid #3b82f6;">
      <span class="modal-close" id="modal-close" style="cursor:pointer; float:right; font-size:1.8rem; color:#aaa;">&times;</span>
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQm8-1rFiM_NhzXsNqWuirSOx8OlbfERAHXOURGsw3Q-S2WONa7ox73AnGTWqPxLMJSdeKFrieBe4Ph/pub?output=csv";
  const REGION_COLUMN_INDEX = 2;
  let allRows = [], nameCol = "", pointsCol = "Total", regionCol = "__region";

  const tierPointsMap = { "HT1":60,"LT1":45,"HT2":30,"LT2":20,"HT3":10,"LT3":6,"HT4":4,"LT4":3,"HT5":2,"LT5":1 };
  const tierColors = { HT1:"#f1c40f", LT1:"#ffa600", HT2:"#bdc3c7", LT2:"#95a5a6", HT3:"#ff8531", LT3:"#f37324", HT4:"#55ffff", LT4:"#aaffff", HT5:"#5555ff", LT5:"#AAAAFF" };

  const MODE_NAMES = ["Spearmace", "MaceCart", "Modern", "DSMP Mace", "NethSMP"];
  const MODE_SHORT_LABELS = {
    "Spearmace": "SPEAR",
    "MaceCart": "CART",
    "Modern": "MOD",
    "DSMP Mace": "DSMP",
    "NethSMP": "NETH"
  };

  function getRoleByPoints(points) {
    const pts = parseFloat(points);
    if (isNaN(pts)) return { name: "CritTiers Rookie", icon: "<i class='fas fa-baby-carriage'></i>", className: "rookie", symbol: "🍼" };
    if (pts >= 100) return { name: "CritTiers Master", icon: "<i class='fas fa-crown'></i>", className: "master", symbol: "🏆" };
    if (pts >= 50) return { name: "CritTiers Ace", icon: "<i class='fas fa-shield-alt'></i>", className: "ace", symbol: "⚡" };
    if (pts >= 25) return { name: "CritTiers Specialist", icon: "<i class='fas fa-star'></i>", className: "specialist", symbol: "✨" };
    if (pts >= 10) return { name: "CritTiers Cadet", icon: "<i class='fas fa-user-graduate'></i>", className: "cadet", symbol: "🎓" };
    if (pts >= 5) return { name: "CritTiers Novice", icon: "<i class='fas fa-feather-alt'></i>", className: "novice", symbol: "🌱" };
    return { name: "CritTiers Rookie", icon: "<i class='fas fa-baby-carriage'></i>", className: "rookie", symbol: "🍼" };
  }

  function getRankBadge(points, large = false) {
    const r = getRoleByPoints(points);
    const cls = large ? `rank ${r.className} rank-large` : `rank ${r.className}`;
    return `<span class="${cls}"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`;
  }

  function getInitial(name) { return name ? name.charAt(0).toUpperCase() : "?"; }

  function findModeColumn(player, modeName) {
    const lowerMode = modeName.toLowerCase();
    for (let key in player) {
      if (key.toLowerCase() === lowerMode) return key;
    }
    const noSpace = modeName.replace(/\s/g, '');
    for (let key in player) {
      if (key.toLowerCase() === noSpace.toLowerCase()) return key;
    }
    return null;
  }

  function getPlayerModes(player) {
    const result = [];
    for (let mode of MODE_NAMES) {
      const col = findModeColumn(player, mode);
      if (col && player[col] && player[col].trim() !== "") {
        result.push({ modeName: mode, rawTier: player[col] });
      }
    }
    return result;
  }

  function extractBaseTierFromCode(tierCode) {
    const match = tierCode.match(/(HT[1-5]|LT[1-5])/i);
    return match ? match[1].toUpperCase() : null;
  }
  function parseTierString(tierStr) {
    if (!tierStr) return null;
    const upper = tierStr.toUpperCase().trim();
    const peakMatch = upper.match(/^(.*?)\s*\(\s*PEAK\s+(HT[1-5]|LT[1-5])\s*\)$/i);
    if (peakMatch) {
      const rawDisplay = peakMatch[1].trim();
      const peakTier = peakMatch[2].toUpperCase();
      const baseTier = extractBaseTierFromCode(rawDisplay);
      if (!baseTier) return null;
      return { display: rawDisplay, baseTier: baseTier, peakTier: peakTier };
    }
    const baseTier = extractBaseTierFromCode(upper);
    if (!baseTier) return null;
    return { display: upper, baseTier: baseTier, peakTier: null };
  }

  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
    const data = lines.slice(1).map(l=>{
      const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
      const obj = {};
      headers.forEach((h,i)=>obj[h]=cells[i]||"");
      obj["__region"] = cells[REGION_COLUMN_INDEX] || "";
      return obj;
    });
    return { headers, data };
  }

  function getModeIconsHTML(player) {
    const modes = getPlayerModes(player);
    if (modes.length === 0) return '<div style="opacity:0.5;"><span class="text-xs text-gray-400">no tiers</span></div>';
    let html = '<div class="flex gap-2 flex-wrap">';
    for (let { modeName, rawTier } of modes) {
      const parsed = parseTierString(rawTier);
      if (!parsed) continue;
      const displayTier = parsed.display;
      const baseTier = parsed.baseTier;
      const peakTier = parsed.peakTier;
      const color = tierColors[baseTier] || "#666";
      let tooltipText = peakTier ? `⚡ Peak: ${peakTier} → ${tierPointsMap[peakTier]} pts` : `${displayTier} → ${tierPointsMap[baseTier]} pts`;
      const shortLabel = MODE_SHORT_LABELS[modeName] || modeName.substring(0, 3).toUpperCase();
      html += `<div class="flex flex-col items-center w-12" data-tooltip="${tooltipText}">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold border-2" style="background:${color}20; border-color:${color}; color:${color};">${shortLabel}</div>
                  <div class="text-[9px] font-bold px-1 rounded-full mt-1" style="background:${color}; color:#000;">${displayTier}</div>
                </div>`;
    }
    html += '</div>';
    return html;
  }

  async function loadCSV() {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const { headers, data } = parseCSV(text);
    allRows = data;
    nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
    const totalCol = headers.find(h=>h.toLowerCase() === "total");
    pointsCol = totalCol ? totalCol : (headers.find(h=>/points/i.test(h)) || headers[1]);
    
    const sortedByPoints = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sortedByPoints.forEach((player, idx) => { player.overallRank = idx + 1; });
    
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";
    const allModes = ["Overall", ...MODE_NAMES];
    allModes.forEach((mode, idx) => {
      const btn = document.createElement("button");
      btn.textContent = mode === "Overall" ? "🏆 OVERALL" : mode.toUpperCase();
      btn.className = "mctier-tab";
      if(idx === 0) btn.classList.add("active");
      btn.onclick = () => {
        document.querySelectorAll(".mctier-tab").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        loadMode(mode);
      };
      tabsDiv.appendChild(btn);
    });
    loadMode("Overall");
  }

  function updateModeTitle(mode) {
    const container = document.getElementById("mode-title-container");
    if (!container) return;
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl font-bold border-l-4 border-blue-500 pl-3 mb-5";
    title.textContent = mode === "Overall" ? "🏆 OVERALL RANKINGS" : `${mode.toUpperCase()} RANKINGS`;
    container.innerHTML = "";
    container.appendChild(title);
  }

  function loadMode(mode) {
    updateModeTitle(mode);
    let htmlOut = "";
    if (mode === "Overall") {
      const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
      sorted.forEach((r, idx) => {
        const name = r[nameCol];
        if(!name) return;
        const rank = idx + 1;
        const pointsVal = parseFloat(r[pointsCol]||0);
        const region = r[regionCol];
        const initial = getInitial(name);
        let bannerClass = "";
        let medalHtml = "";
        if(rank === 1) { bannerClass = "gold-banner"; medalHtml = `<i class="fas fa-crown text-yellow-400 mr-1"></i>`; }
        else if(rank === 2) { bannerClass = "silver-banner"; medalHtml = `<i class="fas fa-medal text-gray-300 mr-1"></i>`; }
        else if(rank === 3) { bannerClass = "bronze-banner"; medalHtml = `<i class="fas fa-medal text-amber-600 mr-1"></i>`; }
        let regionHTML = "";
        if(region) {
          let rc = ""; const reg = region.toUpperCase().trim();
          if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
          regionHTML = `<span class="region-badge ${rc}">${region}</span>`;
        }
        htmlOut += `<div class="player-card ${bannerClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}" data-rank="${rank}">
          <div class="player-avatar">${initial}</div>
          <div class="flex-1">
            <div class="flex items-center flex-wrap gap-2"><span class="font-bold text-lg">${rank}.</span> ${medalHtml}<span class="font-semibold">${name}</span>${regionHTML}</div>
            ${getModeIconsHTML(r)}
          </div>
          <div class="text-right flex flex-col items-end gap-1">
            ${getRankBadge(pointsVal, true)}
            <div class="font-mono text-xl font-bold text-blue-400">${r[pointsCol]} <span class="text-sm">pts</span></div>
          </div>
        </div>`;
      });
    } else {
      // Mode-specific: Tier columns grid
      // Collect all players with tier in this mode
      const playersByTier = {}; // key: baseTier (HT1, LT1, etc.)
      for (const r of allRows) {
        let rawTier = null;
        for (let key in r) {
          if (key.toLowerCase() === mode.toLowerCase()) { rawTier = r[key]; break; }
        }
        if (!rawTier) continue;
        const parsed = parseTierString(rawTier);
        if (!parsed) continue;
        const baseTier = parsed.baseTier;
        if (!playersByTier[baseTier]) playersByTier[baseTier] = [];
        playersByTier[baseTier].push({
          player: r,
          rawTier,
          displayTier: parsed.display,
          baseTier,
          points: parseFloat(r[pointsCol] || 0)
        });
      }
      // Sort each tier group by points descending
      for (let tier in playersByTier) {
        playersByTier[tier].sort((a,b) => b.points - a.points);
      }
      // Define tier groups: Tier 1 = HT1+LT1, Tier 2 = HT2+LT2, ..., Tier 5 = HT5+LT5
      const tierGroups = [
        { name: "Tier 1", tiers: ["HT1", "LT1"] },
        { name: "Tier 2", tiers: ["HT2", "LT2"] },
        { name: "Tier 3", tiers: ["HT3", "LT3"] },
        { name: "Tier 4", tiers: ["HT4", "LT4"] },
        { name: "Tier 5", tiers: ["HT5", "LT5"] }
      ];
      let gridHtml = '<div class="tier-grid">';
      for (const group of tierGroups) {
        let columnHtml = `<div class="tier-column"><div class="tier-header-col" style="background: #2d3748;">${group.name}</div>`;
        let hasAny = false;
        for (const tier of group.tiers) {
          const players = playersByTier[tier] || [];
          if (players.length === 0) continue;
          hasAny = true;
          const isHT = tier.startsWith("HT");
          for (const p of players) {
            const r = p.player;
            const name = r[nameCol];
            const pointsVal = p.points;
            const region = r[regionCol];
            const initial = getInitial(name);
            let regionHTML = "";
            if(region) {
              let rc = ""; const reg = region.toUpperCase().trim();
              if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
              regionHTML = `<span class="region-badge ${rc}" style="font-size:0.6rem; margin-left:4px;">${region}</span>`;
            }
            const cardClass = isHT ? "ht-bright" : "lt-dark";
            columnHtml += `<div class="player-card-tier ${cardClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}" data-rank="${r.overallRank || 999}">
              <div class="player-avatar-small">${initial}</div>
              <div class="player-info">
                <div class="player-name">${name} ${regionHTML}</div>
                <div class="player-points">${pointsVal} pts</div>
              </div>
              <div class="tier-badge-col" style="background:${tierColors[tier]}; color:#000;">${p.displayTier}</div>
            </div>`;
          }
        }
        if (hasAny) gridHtml += columnHtml + '</div>';
      }
      gridHtml += '</div>';
      htmlOut = gridHtml;
      if (gridHtml === '<div class="tier-grid"></div>') htmlOut = '<div class="text-center text-gray-400 py-10">No players found for this mode.</div>';
    }
    document.getElementById("rankings").innerHTML = htmlOut;

    // Attach click handlers to all player cards
    document.querySelectorAll(".player-card, .player-card-tier").forEach(card => {
      card.onclick = (e) => {
        e.stopPropagation();
        const p = JSON.parse(card.dataset.player.replace(/&apos;/g, "'"));
        const region = p[regionCol];
        const pointsVal = parseFloat(p[pointsCol]||0);
        const overallRank = p.overallRank || 999;
        const initial = getInitial(p[nameCol]);
        let regionInline = '';
        if(region) {
          let rc = ""; const reg = region.toUpperCase().trim();
          if(reg==="EU") rc="EU"; else if(reg==="AS") rc="AS"; else if(reg==="NA") rc="NA"; else if(reg==="SA") rc="SA"; else if(reg==="AU") rc="AU";
          regionInline = `<span class="region-badge ${rc} ml-2 align-middle">${region}</span>`;
        }
        let modalHtml = `<div class="flex justify-center mb-4"><div class="player-avatar" style="width:100px;height:100px;font-size:42px;border-width:3px;">${initial}</div></div>
        <h2 class="text-2xl font-bold text-center">${p[nameCol]} ${regionInline}</h2>
        <div class="flex justify-center mt-3">${getRankBadge(pointsVal, true)}</div>
        <div class="mt-6">${getModeIconsHTML(p)}</div>
        <div class="text-center mt-4"><span class="text-gray-400">Overall Rank:</span> <span class="text-xl font-bold text-yellow-400">#${overallRank}</span></div>
        <div class="text-center mt-2 border-t border-gray-600 pt-3"><span class="text-gray-400">Total Points:</span> <span class="text-2xl font-bold text-blue-400">${p[pointsCol]}</span></div>`;
        document.getElementById("modal-content").innerHTML = modalHtml;
        document.getElementById("player-modal").classList.remove("hidden");
      };
    });
  }

  // Search filter (works on both overall and tier cards)
  document.getElementById("search-input").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll(".player-card, .player-card-tier").forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display = text.includes(term) ? "flex" : "none";
    });
    // Also hide empty columns in grid view
    document.querySelectorAll(".tier-column").forEach(col => {
      const visibleCards = Array.from(col.querySelectorAll(".player-card-tier")).some(card => card.style.display !== "none");
      col.style.display = visibleCards ? "block" : "none";
    });
  });

  const copyBtn = document.getElementById("copyIpButton");
  const ipSpan = document.getElementById("serverIpText");
  const toastSpan = document.getElementById("copyToast");
  copyBtn.addEventListener("click", async () => {
    await navigator.clipboard.writeText(ipSpan.innerText);
    toastSpan.style.display = "inline-block";
    setTimeout(() => toastSpan.style.display = "none", 1500);
  });

  document.getElementById("modal-close").onclick = () => document.getElementById("player-modal").classList.add("hidden");

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 180; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = Math.random() * 3 + 1.5;
      p.style.width = `${s}px`;
      p.style.height = `${s}px`;
      p.style.left = `${Math.random() * 100}vw`;
      p.style.animationDuration = `${Math.random() * 20 + 12}s`;
      p.style.animationDelay = `-${Math.random() * 30}s`;
      p.style.opacity = Math.random() * 0.6 + 0.2;
      container.appendChild(p);
    }
  }
  createParticles();
  loadCSV();
  setInterval(() => loadCSV().catch(console.warn), 60000);
</script>
</body>
