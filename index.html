<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CritTiers</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #808080;
    color: white;
}

/* Top bar */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

/* Left side */
.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.left img {
    width: 50px;
    height: 50px;
    border-radius: 8px;
}

.title {
    font-size: 26px;
    font-weight: bold;
}

/* Right side */
.right {
    text-align: right;
}

.search {
    padding: 8px;
    border-radius: 6px;
    border: none;
    outline: none;
}

.discord-btn {
    margin-top: 8px;
    padding: 8px 15px;
    background: #5865F2;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

.discord-btn:hover {
    background: #4752c4;
}

.server-ip {
    margin-top: 8px;
    font-size: 14px;
}

/* Tabs */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 20px 0;
}

.tab {
    padding: 10px 20px;
    background: #444;
    border-radius: 8px;
    cursor: pointer;
}

.tab.active {
    background: #222;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    
    <!-- LEFT -->
    <div class="left">
        <img src="https://i.ibb.co/3bHWyM6/image.png" alt="logo">
        <div class="title">CritTiers</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <input type="text" class="search" placeholder="Search players...">

        <br>

        <button class="discord-btn" onclick="joinDiscord()">
            Join Discord
        </button>

        <div class="server-ip">
            Server IP: <strong>CritTiers.xyz</strong>
        </div>
    </div>

</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active">Overall</div>
    <div class="tab">Spearmace</div>
    <div class="tab">MaceCart</div>
    <div class="tab">Modern</div>
    <div class="tab">DSMP Mace</div>
    <div class="tab">NethSMP</div>
</div>

<script>
// Tab switching (visual)
const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => {
    tab.onclick = () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
    };
});

// Discord button
function joinDiscord() {
    window.open("https://discord.gg/2P7QJDgDh", "_blank");
}
</script>

</body>
</html>
