<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CritTiers · Mace PvP Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1c23 0%, #0a0c10 100%);
    color: #eef2ff;
    overflow-x: hidden;
    min-height: 100vh;
  }
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.5;
    animation: floatParticle linear infinite;
    box-shadow: 0 0 4px rgba(255,255,255,0.8);
  }
  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0.2); opacity: 0; }
    15% { opacity: 0.6; }
    85% { opacity: 0.6; }
    100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
  }

  .top-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 12px 0 16px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 20px;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-left: -8px; }
  .brand-logo {
    width: 48px; height: 48px; border-radius: 12px;
    background: #11141c; object-fit: cover;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
  .brand-name {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, #7cb8ff);
    background-clip: text; -webkit-background-clip: text; color: transparent;
  }
  .right-panel { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-top: -4px; }
  .search-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .search-input {
    background: #12141c; border: 1px solid #2a2e3a; padding: 8px 14px;
    border-radius: 40px; width: 220px; font-family: 'Inter', monospace;
    font-size: 13px; color: #f0f3fa; outline: none;
  }
  .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  .discord-btn {
    background: #5865F2; padding: 7px 16px; border-radius: 40px;
    font-weight: 600; font-size: 13px; color: white;
    display: inline-flex; align-items: center; gap: 6px;
    transition: 0.2s; text-decoration: none;
  }
  .discord-btn:hover { background: #4752c4; transform: scale(1.02); }
  .server-card {
    background: #0f1118; border: 1px solid #262b36; border-radius: 48px;
    padding: 4px 10px 4px 16px; display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(2px);
  }
  .server-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: #8f9bb5; }
  .ip-address { background: #1a1d26; padding: 4px 10px; border-radius: 32px; font-family: monospace; font-weight: 500; font-size: 13px; color: #a3c6ff; }
  .copy-ip-btn { background: #2b2f3e; border: none; color: white; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
  .copy-ip-btn:hover { background: #3f4458; }
  .copy-feedback { font-size: 11px; color: #6cfe9e; margin-left: 4px; }

  .tabs-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 0;
    margin-top: 12px;
  }
  .mctier-tab {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    color: #a9b3cf;
    background: transparent;
    border: none;
    position: relative;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .mctier-tab img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.3));
  }
  .mctier-tab:hover { color: #ffffff; }
  .mctier-tab.active { color: white; }
  .mctier-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 10%;
    width: 80%;
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #7cb8ff, #60a5fa);
    border-radius: 4px;
    box-shadow: 0 0 8px #3b82f6;
  }

  /* Shared card styles */
  .player-card {
    background: #1f2937;
    padding: 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    transition: 0.2s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  /* Top 3 banners (overall) */
  .player-card.gold-banner {
    background: linear-gradient(135deg, #1f2937 0%, #1a1f2c 100%);
    border-left: 4px solid #ffd700;
    box-shadow: 0 0 12px rgba(255,215,0,0.3), inset 0 1px 0 rgba(255,215,0,0.2);
  }
  .player-card.gold-banner::before {
    content: "👑";
    position: absolute;
    top: -8px;
    right: 12px;
    font-size: 28px;
    opacity: 0.2;
    transform: rotate(15deg);
    pointer-events: none;
  }
  .player-card.silver-banner {
    background: linear-gradient(135deg, #1f2937 0%, #1a1f2c 100%);
    border-left: 4px solid #c0c0c0;
    box-shadow: 0 0 10px rgba(192,192,192,0.25), inset 0 1px 0 rgba(192,192,192,0.15);
  }
  .player-card.silver-banner::before {
    content: "🏅";
    position: absolute;
    top: -8px;
    right: 12px;
    font-size: 28px;
    opacity: 0.2;
    transform: rotate(10deg);
    pointer-events: none;
  }
  .player-card.bronze-banner {
    background: linear-gradient(135deg, #1f2937 0%, #1a1f2c 100%);
    border-left: 4px solid #cd7f32;
    box-shadow: 0 0 10px rgba(205,127,50,0.25), inset 0 1px 0 rgba(205,127,50,0.1);
  }
  .player-card.bronze-banner::before {
    content: "🏅";
    position: absolute;
    top: -8px;
    right: 12px;
    font-size: 28px;
    opacity: 0.2;
    transform: rotate(5deg);
    pointer-events: none;
  }
  .player-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 20px rgba(59,130,246,0.3);
    border-color: rgba(59,130,246,0.5);
  }
  .player-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #2d3748;
    border: 2px solid #3b82f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    color: #a0aec0;
    flex-shrink: 0;
  }
  .mode-icons {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .mode-icon-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 52px;
    cursor: help;
  }
  .mode-icon-image {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #2d3748;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #555;
    overflow: hidden;
    transition: 0.1s;
  }
  .mode-icon-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .mode-icon-container:hover .mode-icon-image { transform: scale(1.05); border-color: #3b82f6; }
  .mode-tier {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 9999px;
    text-align: center;
    min-width: 38px;
  }

  /* Rank badges (CritTiers roles) */
  .rank {
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 0.75rem;
  }
  .rank.master { background: linear-gradient(135deg, #ffd966, #ffaa33); color: #2c1a00; }
  .rank.ace { background: linear-gradient(135deg, #a0a0ff, #6c6cff); color: white; }
  .rank.specialist { background: linear-gradient(135deg, #6ab04c, #2ecc71); color: #1a3a1a; }
  .rank.cadet { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
  .rank.novice { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
  .rank.rookie { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; }
  .rank-large { font-size: 1rem !important; padding: 6px 18px !important; }

  .region-badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; margin-left: 6px; }
  .region-badge.EU { background:#22c55e; color:#000; }
  .region-badge.AS { background:#3b82f6; color:#fff; }
  .region-badge.NA { background:#ef4444; color:#fff; }
  .region-badge.SA { background:#db2777; color:#fff; }
  .region-badge.AU { background:#fbbf24; color:#000; }
  .region-badge.ME { background:#f5c542; color:#2c1e00; box-shadow: 0 0 2px #ffdd88; }

  .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); position:fixed; inset:0; display:flex; justify-content:center; align-items:center; z-index:1000; }
  .modal { background:#1f2937; padding:24px; border-radius:28px; max-width:550px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid #3b82f6; box-shadow:0 20px 35px rgba(0,0,0,0.6); }
  .modal-close { cursor:pointer; float:right; font-size:1.8rem; line-height:1; color:#aaa; }
  .modal-close:hover { color:#3b82f6; }

  .main-container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
  @media (max-width: 700px) {
    .top-bar { flex-direction: column; align-items: flex-start; }
    .right-panel { align-items: stretch; width: 100%; }
    .search-input { width: 100%; }
    .player-card { flex-wrap: wrap; }
    .main-container { padding: 0 16px; }
  }

  /* Tier columns grid (for mode tabs) */
  .tier-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 10px;
  }
  .tier-column {
    background: rgba(15, 17, 24, 0.6);
    border-radius: 20px;
    padding: 16px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .tier-header-col {
    font-size: 1.3rem;
    font-weight: 800;
    text-align: center;
    padding: 8px;
    border-radius: 40px;
    margin-bottom: 16px;
    background: #2d3748;
  }
  .player-card-tier {
    background: #1f2937;
    padding: 10px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    transition: 0.2s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .player-card-tier.ht-bright {
    background: linear-gradient(135deg, #2a3a4a, #1f2937);
    border-left: 3px solid #ffd966;
  }
  .player-card-tier.lt-dark {
    background: linear-gradient(135deg, #1a202c, #111827);
    border-left: 3px solid #6c757d;
    opacity: 0.9;
  }
  .player-card-tier:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(59,130,246,0.2);
  }
  .player-avatar-small {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #2d3748;
    border: 2px solid #3b82f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
    color: #a0aec0;
    flex-shrink: 0;
  }
  .player-info {
    flex: 1;
  }
  .player-name {
    font-weight: 600;
    font-size: 0.9rem;
  }
  .player-points {
    font-size: 0.75rem;
    color: #7cb8ff;
  }
  .tier-badge-col {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: #2d3748;
  }
  @media (max-width: 700px) {
    .tier-grid { grid-template-columns: 1fr; }
  }

  /* Shimmer effect for top 3 */
  .player-card.shimmer {
    position: relative;
    overflow: hidden;
  }
  .player-card.shimmer::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(115deg, 
      rgba(255,255,255,0) 0%, 
      rgba(255,255,255,0.12) 35%,
      rgba(255,255,240,0.25) 50%,
      rgba(255,255,255,0.12) 65%,
      rgba(255,255,255,0) 100%);
    transform: skewX(-15deg);
    animation: shimmerGlide 3.2s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  .player-card.shimmer.gold-banner::after {
    animation-duration: 2.8s;
    background: linear-gradient(115deg, 
      rgba(255,215,0,0) 0%, 
      rgba(255,215,0,0.2) 40%,
      rgba(255,255,200,0.4) 55%,
      rgba(255,215,0,0.2) 70%,
      rgba(255,215,0,0) 100%);
  }
  @keyframes shimmerGlide {
    0% { left: -120%; }
    100% { left: 120%; }
  }
  .player-card.shimmer > * {
    position: relative;
    z-index: 2;
  }

  .overall-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 2;
  }
  .rank-number {
    font-size: 1.6rem;
    font-weight: 800;
    min-width: 55px;
    text-align: right;
    background: linear-gradient(135deg, #eef2ff, #7cb8ff);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  .player-name-role {
    display: flex;
    flex-direction: column;
  }
  .player-name-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }
  .player-name-text {
    font-weight: 700;
    font-size: 1rem;
  }
  .player-role-badge {
    margin-top: 4px;
  }

  /* ===== OVERALL TAB: POINTS IN A STRAIGHT LINE & CENTER-ALIGNED ===== */
  .player-card .overall-right {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-left: auto;
  }
  .player-card .points-box {
    width: 110px;            /* fixed width ensures all points numbers align vertically */
    text-align: center;      /* center the points text horizontally */
    flex-shrink: 0;
    background: #0f111a;
    padding: 6px 14px;
    border-radius: 40px;
  }
  .player-card .mode-icons {
    margin-top: 0;
    flex-shrink: 1;
  }
  /* On small screens, allow stacking but keep points left-aligned with fixed width */
  @media (max-width: 700px) {
    .player-card .overall-right {
      flex-wrap: wrap;
      width: 100%;
      justify-content: space-between;
    }
    .player-card .points-box {
      text-align: center;
      width: auto;
      min-width: 100px;
    }
  }

  .points-value {
    font-weight: 800;
    font-size: 1.3rem;
    color: #60a5fa;
  }
  .mode-icons-compact {
    margin-top: 0;
  }

  .modal-detail-table {
    background: #11141c;
    border-radius: 20px;
    padding: 12px;
    margin-top: 16px;
  }
  .modal-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .modal-detail-row:last-child { border-bottom: none; }
  .modal-detail-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  .modal-detail-name img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }
  .modal-detail-tier {
    font-weight: 700;
    background: #2d3748;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
  }
  .modal-detail-points {
    color: #7cb8ff;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="particles"></div>
<div class="main-container">
  <div class="top-bar">
    <div class="brand">
      <img class="brand-logo" src="https://i.ibb.co/3bHWyM6/image.png" alt="CritTiers" onerror="this.src='https://via.placeholder.com/48?text=CT'">
      <span class="brand-name">CritTiers</span>
    </div>
    <div class="right-panel">
      <div class="search-area">
        <input type="text" id="search-input" class="search-input" placeholder="Search players...">
        <a href="https://discord.gg/2P7QJDgDh" target="_blank" class="discord-btn"><i class="fab fa-discord"></i> Join Discord</a>
      </div>
      <div class="server-card">
        <span class="server-label">✦ SERVER IP</span>
        <div class="ip-address" id="serverIpText">CritTiers.xyz</div>
        <button id="copyIpButton" class="copy-ip-btn">📋 COPY</button>
        <span id="copyToast" style="display:none;" class="copy-feedback">✓ Copied!</span>
      </div>
    </div>
  </div>

  <div id="tabs" class="tabs-container"></div>
  <div id="mode-title-container" class="mt-4 mb-2"></div>
  <div id="rankings"></div>

  <div id="player-modal" class="hidden modal-bg">
    <div class="modal">
      <span class="modal-close" id="modal-close">&times;</span>
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQm8-1rFiM_NhzXsNqWuirSOx8OlbfERAHXOURGsw3Q-S2WONa7ox73AnGTWqPxLMJSdeKFrieBe4Ph/pub?output=csv";
  const REGION_COLUMN_INDEX = 2;
  let allRows = [], nameCol = "", pointsCol = "Total", regionCol = "__region";

  const tierPointsMap = { "HT1":60, "LT1":45, "HT2":30, "LT2":20, "HT3":10, "LT3":6, "HT4":4, "LT4":3, "HT5":2, "LT5":1 };
  const tierColors = { HT1:"#f1c40f", LT1:"#ffa600", HT2:"#bdc3c7", LT2:"#95a5a6", HT3:"#ff8531", LT3:"#f37324", HT4:"#55ffff", LT4:"#aaffff", HT5:"#5555ff", LT5:"#AAAAFF" };

  const MODE_NAMES = ["Spearmace", "MaceCart", "Modern", "DSMP Mace", "NethSMP"];
  const MODE_SHORT_LABELS = {
    "Spearmace": "SPEAR",
    "MaceCart": "CART",
    "Modern": "MOD",
    "DSMP Mace": "DSMP",
    "NethSMP": "NETH"
  };

  const MODE_EMOJI = {
    "Spearmace": "https://cdn.discordapp.com/emojis/1489730933312716810.webp?size=96",
    "MaceCart": "https://cdn.discordapp.com/emojis/1479042588601352272.webp?size=96",
    "Modern": "https://cdn.discordapp.com/emojis/1448239872484835389.webp?size=96",
    "DSMP Mace": "https://cdn.discordapp.com/emojis/1479430918514020483.webp?size=96",
    "NethSMP": "https://cdn.discordapp.com/emojis/1484495828889374851.webp?size=96"
  };

  function getRoleByPoints(points) {
    const pts = parseFloat(points);
    if (isNaN(pts)) return { name: "CritTiers Rookie", icon: "<i class='fas fa-baby-carriage'></i>", className: "rookie", symbol: "🍼" };
    if (pts >= 100) return { name: "CritTiers Master", icon: "<i class='fas fa-crown'></i>", className: "master", symbol: "🏆" };
    if (pts >= 50) return { name: "CritTiers Ace", icon: "<i class='fas fa-shield-alt'></i>", className: "ace", symbol: "⚡" };
    if (pts >= 25) return { name: "CritTiers Specialist", icon: "<i class='fas fa-star'></i>", className: "specialist", symbol: "✨" };
    if (pts >= 10) return { name: "CritTiers Cadet", icon: "<i class='fas fa-user-graduate'></i>", className: "cadet", symbol: "🎓" };
    if (pts >= 5) return { name: "CritTiers Novice", icon: "<i class='fas fa-feather-alt'></i>", className: "novice", symbol: "🌱" };
    return { name: "CritTiers Rookie", icon: "<i class='fas fa-baby-carriage'></i>", className: "rookie", symbol: "🍼" };
  }

  function getRankBadge(points, large = false) {
    const r = getRoleByPoints(points);
    const cls = large ? `rank ${r.className} rank-large` : `rank ${r.className}`;
    return `<span class="${cls}"><i class="${r.icon.split(' ')[1]}"></i> ${r.name} ${r.symbol}</span>`;
  }

  function getInitial(name) { return name ? name.charAt(0).toUpperCase() : "?"; }

  function findModeColumn(player, modeName) {
    const lowerMode = modeName.toLowerCase();
    for (let key in player) {
      if (key.toLowerCase() === lowerMode) return key;
    }
    const noSpace = modeName.replace(/\s/g, '');
    for (let key in player) {
      if (key.toLowerCase() === noSpace.toLowerCase()) return key;
    }
    return null;
  }

  function getPlayerModes(player) {
    const result = [];
    for (let mode of MODE_NAMES) {
      const col = findModeColumn(player, mode);
      if (col && player[col] && player[col].trim() !== "") {
        result.push({ modeName: mode, rawTier: player[col] });
      }
    }
    return result;
  }

  function extractBaseTierFromCode(tierCode) {
    const match = tierCode.match(/(HT[1-5]|LT[1-5])/i);
    return match ? match[1].toUpperCase() : null;
  }
  function parseTierString(tierStr) {
    if (!tierStr) return null;
    const upper = tierStr.toUpperCase().trim();
    const peakMatch = upper.match(/^(.*?)\s*\(\s*PEAK\s+(HT[1-5]|LT[1-5])\s*\)$/i);
    if (peakMatch) {
      const rawDisplay = peakMatch[1].trim();
      const peakTier = peakMatch[2].toUpperCase();
      const baseTier = extractBaseTierFromCode(rawDisplay);
      if (!baseTier) return null;
      return { display: rawDisplay, baseTier: baseTier, peakTier: peakTier };
    }
    const baseTier = extractBaseTierFromCode(upper);
    if (!baseTier) return null;
    return { display: upper, baseTier: baseTier, peakTier: null };
  }

  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h=>h.replace(/"/g,'').trim());
    const data = lines.slice(1).map(l=>{
      const cells = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/"/g,'').trim());
      const obj = {};
      headers.forEach((h,i)=>obj[h]=cells[i]||"");
      obj["__region"] = cells[REGION_COLUMN_INDEX] || "";
      return obj;
    });
    return { headers, data };
  }

  function getModeIconsHTML(player, compact = false) {
    const modes = getPlayerModes(player);
    if (modes.length === 0) return '<div class="mode-icons mode-icons-compact" style="opacity:0.5;"><span class="text-xs text-gray-400">no tiers</span></div>';
    let html = `<div class="mode-icons ${compact ? 'mode-icons-compact' : ''}">`;
    for (let { modeName, rawTier } of modes) {
      const parsed = parseTierString(rawTier);
      if (!parsed) continue;
      const displayTier = parsed.display;
      const baseTier = parsed.baseTier;
      const peakTier = parsed.peakTier;
      const color = tierColors[baseTier] || "#666";
      let tooltipText = "";
      if (peakTier) {
        const currentPoints = tierPointsMap[baseTier] || 0;
        const peakPoints = tierPointsMap[peakTier] || 0;
        tooltipText = `⚡ Peak: ${peakTier} (${peakPoints} pts) | Current: ${displayTier} (${currentPoints} pts)`;
      } else {
        const points = tierPointsMap[baseTier] || 0;
        tooltipText = `${displayTier} → ${points} pts`;
      }
      const imgUrl = MODE_EMOJI[modeName] || "";
      html += `<div class="mode-icon-container" title="${tooltipText}">
                  <div class="mode-icon-image" style="border-color:${color};">
                    <img src="${imgUrl}" alt="${MODE_SHORT_LABELS[modeName]}" loading="lazy">
                  </div>
                  <div class="mode-tier" style="background:${color}; color:#000;">${displayTier}</div>
                </div>`;
    }
    html += '</div>';
    return html;
  }

  async function loadCSV() {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const { headers, data } = parseCSV(text);
    allRows = data;
    nameCol = headers.find(h=>/name|player/i.test(h)) || headers[0];
    const totalCol = headers.find(h=>h.toLowerCase() === "total");
    pointsCol = totalCol ? totalCol : (headers.find(h=>/points/i.test(h)) || headers[1]);
    
    const sortedByPoints = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
    sortedByPoints.forEach((player, idx) => { player.overallRank = idx + 1; });
    
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";
    const allModes = ["Overall", ...MODE_NAMES];
    allModes.forEach((mode, idx) => {
      const btn = document.createElement("button");
      btn.className = "mctier-tab";
      if(idx === 0) btn.classList.add("active");
      if (mode === "Overall") {
        btn.innerHTML = `🏆 OVERALL`;
      } else {
        const emojiUrl = MODE_EMOJI[mode];
        btn.innerHTML = `<img src="${emojiUrl}" alt="${mode}" loading="lazy"> ${mode.toUpperCase()}`;
      }
      btn.onclick = () => {
        document.querySelectorAll(".mctier-tab").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        loadMode(mode);
      };
      tabsDiv.appendChild(btn);
    });
    loadMode("Overall");
  }

  function updateModeTitle(mode) {
    const container = document.getElementById("mode-title-container");
    if (!container) return;
    const title = document.createElement("h2");
    title.id = "mode-title";
    title.className = "text-2xl font-bold border-l-4 border-blue-500 pl-3 mb-5";
    title.textContent = mode === "Overall" ? "🏆 OVERALL RANKINGS" : `${mode.toUpperCase()} RANKINGS`;
    container.innerHTML = "";
    container.appendChild(title);
  }

  function getRegionClass(region) {
    if (!region) return "";
    const reg = region.toUpperCase().trim();
    if (reg === "EU") return "EU";
    if (reg === "AS") return "AS";
    if (reg === "NA") return "NA";
    if (reg === "SA") return "SA";
    if (reg === "AU") return "AU";
    if (reg === "ME") return "ME";
    return "";
  }

  function loadMode(mode) {
    updateModeTitle(mode);
    let htmlOut = "";
    if (mode === "Overall") {
      const sorted = [...allRows].sort((a,b)=>parseFloat(b[pointsCol]||0)-parseFloat(a[pointsCol]||0));
      sorted.forEach((r, idx) => {
        const name = r[nameCol];
        if(!name) return;
        const rank = idx + 1;
        const pointsVal = parseFloat(r[pointsCol]||0);
        const region = r[regionCol];
        const initial = getInitial(name);
        let bannerClass = "";
        let shimmerClass = "";
        if(rank === 1) { bannerClass = "gold-banner"; shimmerClass = "shimmer"; }
        else if(rank === 2) { bannerClass = "silver-banner"; shimmerClass = "shimmer"; }
        else if(rank === 3) { bannerClass = "bronze-banner"; shimmerClass = "shimmer"; }
        
        let regionHTML = "";
        const regionClass = getRegionClass(region);
        if(region && regionClass) regionHTML = `<span class="region-badge ${regionClass}">${region}</span>`;
        const roleSmall = getRoleByPoints(pointsVal);
        const roleHtml = `<span class="rank ${roleSmall.className}" style="font-size:0.7rem; padding:2px 10px;"><i class="${roleSmall.icon.split(' ')[1]}"></i> ${roleSmall.name}</span>`;
        const pointsDisplay = `<div class="points-box"><span class="points-value">${r[pointsCol]}</span> <span class="text-xs text-gray-400">pts</span></div>`;
        const modeIconsCompact = getModeIconsHTML(r, true);
        htmlOut += `<div class="player-card ${bannerClass} ${shimmerClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${pointsVal}" data-rank="${rank}">
          <div class="overall-left">
            <div class="rank-number">#${rank}</div>
            <div class="player-avatar">${initial}</div>
            <div class="player-name-role">
              <div class="player-name-line"><span class="player-name-text">${name}</span>${regionHTML}</div>
              <div class="player-role-badge">${roleHtml}</div>
            </div>
          </div>
          <div class="overall-right">${pointsDisplay}${modeIconsCompact}</div>
        </div>`;
      });
    } else {
      const tierGroups = [
        { name: "Tier 1", tiers: ["HT1", "LT1"] }, { name: "Tier 2", tiers: ["HT2", "LT2"] },
        { name: "Tier 3", tiers: ["HT3", "LT3"] }, { name: "Tier 4", tiers: ["HT4", "LT4"] },
        { name: "Tier 5", tiers: ["HT5", "LT5"] }
      ];
      const playersByTier = {};
      for (const r of allRows) {
        let rawTier = null;
        for (let key in r) if (key.toLowerCase() === mode.toLowerCase()) { rawTier = r[key]; break; }
        if (!rawTier) continue;
        const parsed = parseTierString(rawTier);
        if (!parsed) continue;
        const baseTier = parsed.baseTier;
        if (!playersByTier[baseTier]) playersByTier[baseTier] = [];
        playersByTier[baseTier].push({ player: r, rawTier, displayTier: parsed.display, baseTier, points: parseFloat(r[pointsCol] || 0) });
      }
      for (let tier in playersByTier) playersByTier[tier].sort((a,b) => b.points - a.points);
      let gridHtml = '<div class="tier-grid">';
      for (const group of tierGroups) {
        let columnHtml = `<div class="tier-column"><div class="tier-header-col">${group.name}</div>`;
        let hasAny = false;
        for (const tier of group.tiers) {
          const players = playersByTier[tier] || [];
          if (players.length === 0) continue;
          hasAny = true;
          const isHT = tier.startsWith("HT");
          for (const p of players) {
            const r = p.player;
            const name = r[nameCol];
            const region = r[regionCol];
            const initial = getInitial(name);
            let regionHTML = "";
            const regionClass = getRegionClass(region);
            if(region && regionClass) regionHTML = `<span class="region-badge ${regionClass}" style="font-size:0.6rem; margin-left:4px;">${region}</span>`;
            const cardClass = isHT ? "ht-bright" : "lt-dark";
            columnHtml += `<div class="player-card-tier ${cardClass}" data-player='${JSON.stringify(r).replace(/'/g, "&apos;")}' data-points="${p.points}" data-rank="${r.overallRank || 999}">
              <div class="player-avatar-small">${initial}</div>
              <div class="player-info"><div class="player-name">${name} ${regionHTML}</div><div class="player-points">${p.points} pts</div></div>
              <div class="tier-badge-col" style="background:${tierColors[tier]}; color:#000;">${p.displayTier}</div>
            </div>`;
          }
        }
        if (hasAny) gridHtml += columnHtml + '</div>';
      }
      gridHtml += '</div>';
      htmlOut = gridHtml || '<div class="text-center text-gray-400 py-10">No players found for this mode.</div>';
    }
    document.getElementById("rankings").innerHTML = htmlOut;

    document.querySelectorAll(".player-card, .player-card-tier").forEach(card => {
      card.onclick = () => {
        const p = JSON.parse(card.dataset.player.replace(/&apos;/g, "'"));
        const region = p[regionCol];
        const pointsVal = parseFloat(p[pointsCol]||0);
        const overallRank = p.overallRank || 999;
        const initial = getInitial(p[nameCol]);
        let regionInline = '';
        const regionClass = getRegionClass(region);
        if(region && regionClass) regionInline = `<span class="region-badge ${regionClass} ml-2 align-middle">${region}</span>`;
        
        const modesDetail = getPlayerModes(p);
        let detailRows = '';
        for (let { modeName, rawTier } of modesDetail) {
          const parsed = parseTierString(rawTier);
          if (!parsed) continue;
          const pointsEarned = tierPointsMap[parsed.baseTier] || 0;
          const imgUrl = MODE_EMOJI[modeName];
          detailRows += `<div class="modal-detail-row">
            <div class="modal-detail-name"><img src="${imgUrl}" alt="${modeName}"> ${modeName}</div>
            <div><span class="modal-detail-tier">${parsed.display}</span> ${parsed.peakTier ? `<span class="text-xs text-yellow-300 ml-2">(peak ${parsed.peakTier})</span>` : ''}</div>
            <div class="modal-detail-points">${pointsEarned} pts</div>
          </div>`;
        }
        if (detailRows === '') detailRows = '<div class="text-center text-gray-400 py-2">No ranked modes found.</div>';
        
        let modalHtml = `<div class="flex justify-center mb-4"><div class="player-avatar" style="width:100px;height:100px;font-size:42px;border-width:3px;">${initial}</div></div>
        <h2 class="text-2xl font-bold text-center">${p[nameCol]} ${regionInline}</h2>
        <div class="flex justify-center mt-3">${getRankBadge(pointsVal, true)}</div>
        <div class="mt-6">${getModeIconsHTML(p, false)}</div>
        <div class="text-center mt-4"><span class="text-gray-400">Overall Rank:</span> <span class="text-xl font-bold text-yellow-400">#${overallRank}</span></div>
        <div class="text-center mt-2"><span class="text-gray-400">Total Points:</span> <span class="text-2xl font-bold text-blue-400">${p[pointsCol]}</span></div>
        <div class="modal-detail-table"><div class="font-bold mb-2 text-blue-300">📊 FULL BOT BREAKDOWN (per mode)</div>${detailRows}</div>`;
        document.getElementById("modal-content").innerHTML = modalHtml;
        document.getElementById("player-modal").classList.remove("hidden");
      };
    });
  }

  document.getElementById("search-input").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll(".player-card, .player-card-tier").forEach(card => {
      card.style.display = card.textContent.toLowerCase().includes(term) ? "flex" : "none";
    });
    document.querySelectorAll(".tier-column").forEach(col => {
      const visibleCards = Array.from(col.querySelectorAll(".player-card-tier")).some(c => c.style.display !== "none");
      col.style.display = visibleCards ? "block" : "none";
    });
  });

  const copyBtn = document.getElementById("copyIpButton");
  const ipSpan = document.getElementById("serverIpText");
  const toastSpan = document.getElementById("copyToast");
  copyBtn.addEventListener("click", async () => {
    await navigator.clipboard.writeText(ipSpan.innerText);
    toastSpan.style.display = "inline-block";
    setTimeout(() => toastSpan.style.display = "none", 1500);
  });

  document.getElementById("modal-close").onclick = () => document.getElementById("player-modal").classList.add("hidden");

  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 180; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = Math.random() * 3 + 1.5;
      p.style.width = `${s}px`;
      p.style.height = `${s}px`;
      p.style.left = `${Math.random() * 100}vw`;
      p.style.animationDuration = `${Math.random() * 20 + 12}s`;
      p.style.animationDelay = `-${Math.random() * 30}s`;
      p.style.opacity = Math.random() * 0.6 + 0.2;
      container.appendChild(p);
    }
  }
  createParticles();
  loadCSV();
  setInterval(() => loadCSV().catch(console.warn), 60000);
</script>
</body>
</html>
