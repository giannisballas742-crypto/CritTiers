<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CritTiers</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #808080;
    color: white;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 30px 40px 10px 40px;
}

/* LEFT */
.left {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px; /* move down slightly */
}

.left img {
    width: 55px;
    height: 55px;
    border-radius: 10px;
}

.title {
    font-size: 28px;
    font-weight: bold;
}

/* RIGHT */
.right {
    text-align: right;
}

.search {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    outline: none;
}

.server-box {
    margin-top: 10px;
    background: #222;
    padding: 8px 12px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

.server-ip {
    background: #111;
    padding: 5px 10px;
    border-radius: 6px;
}

/* TABS */
.tabs {
    display: flex;
    gap: 15px;
    padding: 10px 40px;
    overflow-x: auto;
}

.tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: #2c2c2c;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: 0.2s;
    border: 1px solid transparent;
}

.tab:hover {
    background: #3a3a3a;
}

.tab.active {
    border-bottom: 2px solid white;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    
    <!-- LEFT -->
    <div class="left">
        <img src="https://i.ibb.co/3bHWyM6/image.png" alt="logo">
        <div class="title">CritTiers</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <input type="text" class="search" placeholder="Search players...">

        <div class="server-box">
            <span>SERVER IP</span>
            <div class="server-ip">CritTiers.xyz</div>
        </div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active">🏆 Overall</div>
    <div class="tab"> Spearmace</div>
    <div class="tab"> MaceCart</div>
    <div class="tab"> Modern</div>
    <div class="tab"> DSMP Mace</div>
    <div class="tab"> NethSMP</div>
</div>

<script>
const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => {
    tab.onclick = () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
    };
});
</script>

</body>
</html>
