<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CritTiers | Mace PvP Leaderboards</title>
  <!-- Google Fonts: Inter for modern MCTiers-like typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0d12;
      color: #eef2ff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* animated particle canvas background */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* main content layer */
    .app-wrapper {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px 48px 28px;
    }

    /* ========= TOP BAR (MCTIERS STYLE) ========= */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 32px 0 20px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #11141c;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease;
    }

    .brand-logo:hover {
      transform: scale(1.02);
    }

    .brand-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #b9c8ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    /* search input - clean */
    .search-input {
      background: #12141c;
      border: 1px solid #2a2e3a;
      padding: 10px 16px;
      border-radius: 40px;
      width: 240px;
      font-family: 'Inter', monospace;
      font-size: 14px;
      color: #f0f3fa;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 0 2px rgba(79, 172, 254, 0.2);
    }

    .search-input::placeholder {
      color: #6c6f7e;
      font-weight: 400;
    }

    /* SERVER CARD (MCTIERS INSPIRED) */
    .server-card {
      background: #0f1118;
      border: 1px solid #262b36;
      border-radius: 48px;
      padding: 6px 12px 6px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(2px);
      transition: border 0.2s;
    }

    .server-label {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8f9bb5;
    }

    .ip-address {
      background: #0101014d;
      background: #1a1d26;
      padding: 6px 14px;
      border-radius: 32px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.5px;
      color: #b9e2ff;
    }

    .copy-ip-btn {
      background: #2b2f3e;
      border: none;
      color: white;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }

    .copy-ip-btn:hover {
      background: #3f4458;
      transform: scale(0.97);
    }

    .copy-feedback {
      font-size: 12px;
      color: #6cfe9e;
      margin-left: 6px;
    }

    /* ========= TABS (EXACT MCTIERS STYLE: UPPERCASE, NO EMOJI EXCEPT OVERALL) ========= */
    .tabs-container {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0;
    }

    .mctier-tab {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 12px 18px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      color: #a9b3cf;
      background: transparent;
      border: none;
      position: relative;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .mctier-tab:hover {
      color: #ffffff;
    }

    .mctier-tab.active {
      color: white;
    }

    .mctier-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 10%;
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, #4facfe, #9ad0ff, #00e0ff);
      border-radius: 4px;
      box-shadow: 0 0 8px #00c3ff;
    }

    /* leaderboard panel */
    .leaderboard-panels {
      margin-top: 36px;
    }

    .leader-panel {
      display: none;
      animation: fadeSlide 0.25s ease-out;
    }

    .leader-panel.active-panel {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MCTIERS STYLE TABLE */
    .rank-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(12, 14, 20, 0.75);
      backdrop-filter: blur(3px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rank-table thead tr {
      background: #0f121bb3;
      border-bottom: 1px solid #2d3342;
    }

    .rank-table th {
      text-align: left;
      padding: 18px 20px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #b3c7ff;
      background: #0a0c14;
    }

    .rank-table td {
      padding: 16px 20px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #eef2ff;
      font-size: 15px;
    }

    .rank-table tr {
      transition: background 0.15s;
    }

    .rank-table tbody tr:hover {
      background: rgba(79, 172, 254, 0.08);
      cursor: default;
    }

    .rank-number {
      font-weight: 700;
      color: #cbd5ff;
      font-size: 16px;
    }

    .player-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-avatar {
      width: 28px;
      height: 28px;
      background: #1e2538;
      border-radius: 30px;
      display: inline-block;
    }

    .kdr-high {
      color: #6cf9b0;
      font-weight: 700;
    }

    .stat-badge {
      background: #1b1f2c;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    /* table responsive */
    .table-responsive {
      overflow-x: auto;
      border-radius: 24px;
    }

    /* footer note */
    .footer-note {
      margin-top: 48px;
      text-align: center;
      font-size: 13px;
      color: #6c6f85;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 28px;
    }

    @media (max-width: 750px) {
      .app-wrapper {
        padding: 0 20px 32px 20px;
      }
      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }
      .right-panel {
        align-items: stretch;
        width: 100%;
      }
      .search-input {
        width: 100%;
      }
      .server-card {
        justify-content: space-between;
      }
      .mctier-tab {
        padding: 8px 12px;
        font-size: 13px;
      }
      .rank-table th, .rank-table td {
        padding: 12px 12px;
      }
    }
  </style>
</head>

    nethsmp: {

      rows: [
        { rank: 1, player: "NetherLord", kills: 2103, deaths: 790, kdr: 2.66 },

        { rank: 8, player: "WarpedAxe", kills: 1092, deaths: 545, kdr: 2.00 },

        { rank: 10, player: "StriderRider", kills: 876, deaths: 446, kdr: 1.96 }

  // Helper: generate HTML table from data rows
  function buildTableHTML(rows) {
    let html = `
      <div class="table-responsive">
        <table class="rank-table">
          <thead>
            <tr><th># RANK</th><th>PLAYER</th><th>KILLS</th><th>DEATHS</th><th>KDR</th></tr>
          </thead>
          <tbody>
    `;
    rows.forEach(row => {
      const kdrClass = row.kdr >= 2.4 ? 'kdr-high' : '';
      html += `
        <tr>
          <td class="rank-number">#${row.rank}</td>
          <td class="player-name"><span class="player-avatar" style="background:${getAvatarColor(row.player)};"></span> ${escapeHtml(row.player)}</td>
          <td>${row.kills.toLocaleString()}</td>
          <td>${row.deaths.toLocaleString()}</td>
          <td class="${kdrClass}">${row.kdr.toFixed(2)}</td>
        </tr>
      `;
    });
    html += `</tbody></table></div>`;
    return html;
  }

  function getAvatarColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
    const hue = Math.abs(hash % 360);
    return `hsl(${hue}, 65%, 45%)`;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // DOM elements
  const leaderboardRoot = document.getElementById('leaderboardRoot');
  const tabButtons = document.querySelectorAll('.mctier-tab');
  const searchInput = document.getElementById('globalSearch');

  let currentActiveTab = 'overall';
  let panelsMap = new Map(); // store panel DOM elements for each tab

  // create all panels and inject
  function initPanels() {
    for (const [key, data] of Object.entries(leaderboardData)) {
      const panelDiv = document.createElement('div');
      panelDiv.className = 'leader-panel';
      panelDiv.setAttribute('data-panel', key);
      panelDiv.innerHTML = buildTableHTML(data.rows);
      leaderboardRoot.appendChild(panelDiv);
      panelsMap.set(key, panelDiv);
    }
    // show default
    setActivePanel('overall');
  }

  function setActivePanel(tabId) {
    // hide all panels
    for (let panel of panelsMap.values()) {
      panel.classList.remove('active-panel');
    }
    const targetPanel = panelsMap.get(tabId);
    if (targetPanel) targetPanel.classList.add('active-panel');
    currentActiveTab = tabId;
    // reset search input and refilter if needed
    if (searchInput) {
      searchInput.value = '';
      // clear filtering: show original data for current tab
      resetFilterForCurrentTab();
    }
  }

  // filter functionality (only works on active visible panel)
  function filterCurrentTable(searchTerm) {
    const activePanel = panelsMap.get(currentActiveTab);
    if (!activePanel) return;
    const originalRows = leaderboardData[currentActiveTab]?.rows;
    if (!originalRows) return;

    const term = searchTerm.trim().toLowerCase();
    if (term === "") {
      // restore full table
      activePanel.innerHTML = buildTableHTML(originalRows);
      return;
    }
    const filteredRows = originalRows.filter(row => row.player.toLowerCase().includes(term));
    if (filteredRows.length === 0) {
      activePanel.innerHTML = `<div class="table-responsive"><div style="padding: 40px; text-align: center; background:#0f1118; border-radius: 28px;">❌ No players match "${escapeHtml(searchTerm)}"</div></div>`;
    } else {
      activePanel.innerHTML = buildTableHTML(filteredRows);
    }
  }

  function resetFilterForCurrentTab() {
    const activePanel = panelsMap.get(currentActiveTab);
    if (activePanel && leaderboardData[currentActiveTab]) {
      activePanel.innerHTML = buildTableHTML(leaderboardData[currentActiveTab].rows);
    }
  }

  // Attach search listener with debounce
  let debounceTimer;
  function onSearchInput(e) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const val = e.target.value;
      filterCurrentTable(val);
    }, 280);
  }

  // TAB switching with MCTIERS style (remove emojis from others except overall)
  function switchTab(tabId, btnElement) {
    // update active class on buttons
    tabButtons.forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    // update visible panel
    setActivePanel(tabId);
  }

  // event binding + copy IP feature
  function bindEvents() {
    tabButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tabValue = btn.getAttribute('data-tab');
        if (tabValue) {
          switchTab(tabValue, btn);
        }
      });
    });

    if (searchInput) {
      searchInput.addEventListener('input', onSearchInput);
    }

    // copy IP functionality with feedback
    const copyBtn = document.getElementById('copyIpButton');
    const ipSpan = document.getElementById('serverIpText');
    const toastSpan = document.getElementById('copyToast');
    if (copyBtn && ipSpan) {
      copyBtn.addEventListener('click', async () => {
        const ip = ipSpan.innerText;
        try {
          await navigator.clipboard.writeText(ip);
          if (toastSpan) {
            toastSpan.style.display = 'inline-block';
            setTimeout(() => {
              toastSpan.style.display = 'none';
            }, 1800);
          } else {
            alert(`Copied: ${ip}`);
          }
        } catch (err) {
          console.warn('Clipboard failed');
          const textArea = document.createElement('textarea');
          textArea.value = ip;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          if (toastSpan) {
            toastSpan.style.display = 'inline-block';
            setTimeout(() => toastSpan.style.display = 'none', 1500);
          }
        }
      });
    }
  }

  // Particles effect (original bigger stars with twinkle)
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  let starsArray = [];
  function initStars() {
    const starCount = 160;
    for (let i = 0; i < starCount; i++) {
      starsArray.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.8 + 0.6,
        alpha: Math.random() * 0.7 + 0.2,
        delta: Math.random() * 0.012 + 0.003,
        direction: Math.random() > 0.5 ? 1 : -1
      });
    }
  }
  function drawStars() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of starsArray) {
      ctx.beginPath();
      ctx.fillStyle = `rgba(255, 240, 210, ${s.alpha})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
      s.alpha += s.delta * s.direction;
      if (s.alpha <= 0.1) {
        s.alpha = 0.1;
        s.direction = 1;
      } else if (s.alpha >= 0.95) {
        s.alpha = 0.95;
        s.direction = -1;
      }
    }
    requestAnimationFrame(drawStars);
  }
  window.addEventListener('resize', () => {
    resizeCanvas();
    starsArray = [];
    initStars();
  });
  resizeCanvas();
  initStars();
  drawStars();

  // INIT everything
  initPanels();
  bindEvents();
  // enforce only overall has emoji: already in HTML 🏆 OVERALL, others no emoji, uppercase
  // double-check tab texts: others uppercase without any icon, good.
  // Also small UI: make sure any default search reset works

</script>
