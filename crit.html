<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace Tier List</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #808080;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 20px;
    background: #444;
    border-radius: 8px;
    cursor: pointer;
}

.tab.active {
    background: #222;
}

.container {
    width: 90%;
    margin: auto;
}

.player-card {
    background: #333;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<header>Mace Tier List</header>

<div class="tabs" id="tabs"></div>
<div class="container" id="content"></div>

<script>
const gameModes = [
    "Spearmace",
    "MaceCart",
    "Modern",
    "DSMP Mace",
    "NethSMP"
];

// 🔥 PUT YOUR CSV LINK HERE
const sheetURL = "PASTE_YOUR_CSV_LINK_HERE";

let currentMode = gameModes[0];
let data = [];

// Create tabs
function createTabs() {
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";

    gameModes.forEach(mode => {
        const tab = document.createElement("div");
        tab.className = "tab" + (mode === currentMode ? " active" : "");
        tab.innerText = mode;

        tab.onclick = () => {
            currentMode = mode;
            createTabs();
            render();
        };

        tabsDiv.appendChild(tab);
    });
}

// Render players
function render() {
    const container = document.getElementById("content");
    container.innerHTML = "";

    const filtered = data.filter(p => p.Mode === currentMode);

    filtered.forEach(player => {
        const card = document.createElement("div");
        card.className = "player-card";

        card.innerHTML = `
            <div>
                <strong>${player.Name}</strong><br>
                Region: ${player.Region}
            </div>
            <div>
                Tier: ${player.Tier}
            </div>
        `;

        container.appendChild(card);
    });
}

// Parse CSV
function parseCSV(text) {
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows[0];

    return rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => {
            obj[h.trim()] = (row[i] || "").trim();
        });
        return obj;
    });
}

// Fetch data
async function fetchData() {
    try {
        const res = await fetch(sheetURL);
        const text = await res.text();

        data = parseCSV(text);
        render();
    } catch (e) {
        console.error("Error loading CSV:", e);
    }
}

// Init
createTabs();
fetchData();

// Auto update every 30s
setInterval(fetchData, 30000);
</script>

</body>
</html>
