<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace Tier List</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #808080; /* gray background */
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 20px;
    background: #444;
    border-radius: 8px;
    cursor: pointer;
}

.tab.active {
    background: #222;
}

.container {
    width: 90%;
    margin: auto;
}

.player-card {
    background: #333;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>
<body>

<header>Mace Tier List</header>

<div class="tabs" id="tabs"></div>

<div class="container" id="content"></div>

<script>
const gameModes = [
    "Spearmace",
    "MaceCart",
    "Modern",
    "DSMP Mace",
    "NethSMP"
];

const sheetURL = "https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1";

let currentMode = gameModes[0];
let data = [];

function createTabs() {
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";

    gameModes.forEach(mode => {
        const tab = document.createElement("div");
        tab.className = "tab" + (mode === currentMode ? " active" : "");
        tab.innerText = mode;
        tab.onclick = () => {
            currentMode = mode;
            createTabs();
            render();
        };
        tabsDiv.appendChild(tab);
    });
}

function render() {
    const container = document.getElementById("content");
    container.innerHTML = "";

    const filtered = data.filter(p => p.Mode === currentMode);

    filtered.forEach(player => {
        const card = document.createElement("div");
        card.className = "player-card";

        card.innerHTML = `
            <div>
                <strong>${player.Name}</strong><br>
                Region: ${player.Region}
            </div>
            <div>
                Tier: ${player.Tier}
            </div>
        `;

        container.appendChild(card);
    });
}

async function fetchData() {
    try {
        const res = await fetch(sheetURL);
        data = await res.json();
        render();
    } catch (e) {
        console.error("Error loading sheet", e);
    }
}

createTabs();
fetchData();

// Auto refresh every 30 seconds
setInterval(fetchData, 30000);
</script>

</body>
</html>
