<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mace Modes</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #808080;
    color: white;
    text-align: center;
}

header {
    font-size: 32px;
    padding: 30px 0;
    font-weight: bold;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.tab {
    padding: 12px 25px;
    background: #444;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.tab:hover {
    background: #555;
}

.tab.active {
    background: #222;
}
</style>
</head>

<body>

<header>Mace Gamemodes</header>

<div class="tabs">
    <div class="tab active">Spearmace</div>
    <div class="tab">MaceCart</div>
    <div class="tab">Modern</div>
    <div class="tab">DSMP Mace</div>
    <div class="tab">NethSMP</div>
</div>

<script>
// Optional: make tabs clickable (visual only)
const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => {
    tab.onclick = () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
    };
});
</script>

</body>
</html>
